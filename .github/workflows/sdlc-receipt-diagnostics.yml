name: SDLC Receipt Diagnostics

on:
  push:
    branches:
      - agent/sdlc-v2-phase2a2b-artifact-receipts
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sdlc-receipt-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2a2b-artifact-receipts
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.8.0
      - name: Verify and apply exact patch
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          target_source=fee58776c41d78992078330d2333f251221d30483b46cbb9d4a55a5c745c6ddc
          target_test=11fb8f219619e911b6d545d7699788a77525ac7dfbef12526e94e3b6999b2e29
          current_source=$(sha256sum scripts/sdlc/artifact_receipt.py | cut -d' ' -f1)
          current_test=$(sha256sum newsroom/tests/test_sdlc_artifact_receipt.py | cut -d' ' -f1)
          if [[ "$current_source" == "$target_source" && "$current_test" == "$target_test" ]]; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test "$(sha256sum .sdlc/receipt-fix.patch.gz.b64 | cut -d' ' -f1)" = 2852a91797220ab2e5cfcd446610b10af3a4024179c509cfbf66f99e744d99f3
          base64 --decode .sdlc/receipt-fix.patch.gz.b64 > receipt-fix.patch.gz
          test "$(sha256sum receipt-fix.patch.gz | cut -d' ' -f1)" = 9be12f50022eb03b09754ab3ba8282ba75e05e7ffe13a9d5b0c2964f1f7eb861
          gzip --decompress --stdout receipt-fix.patch.gz > receipt-fix.patch
          test "$(sha256sum receipt-fix.patch | cut -d' ' -f1)" = 824f4a72f026ecf663ef0f1da513d389fab457d902636bf0c04bfd74f21adede
          git apply --check receipt-fix.patch
          git apply receipt-fix.patch
          test "$(sha256sum scripts/sdlc/artifact_receipt.py | cut -d' ' -f1)" = "$target_source"
          test "$(sha256sum newsroom/tests/test_sdlc_artifact_receipt.py | cut -d' ' -f1)" = "$target_test"
          echo 'changed=true' >> "$GITHUB_OUTPUT"
      - name: Sync locked environment
        run: uv sync --dev --locked
      - name: Compile
        run: uv run python -m compileall -q newsroom scripts
      - name: Run focused receipt tests
        shell: bash
        run: |
          set +e
          uv run python -m pytest -vv --tb=long newsroom/tests/test_sdlc_artifact_receipt.py > focused.log 2>&1
          status=$?
          printf '%s\n' "$status" > focused.status
          exit 0
      - name: Run broader SDLC tests
        shell: bash
        run: |
          set +e
          uv run python -m pytest -vv --tb=long \
            newsroom/tests/test_sdlc_artifact_envelope.py \
            newsroom/tests/test_sdlc_classifier.py \
            newsroom/tests/test_sdlc_command_spec.py \
            newsroom/tests/test_sdlc_contract.py \
            newsroom/tests/test_sdlc_dependencies.py \
            newsroom/tests/test_sdlc_dependency_routing.py \
            newsroom/tests/test_sdlc_evidence.py \
            newsroom/tests/test_sdlc_exact_checkout.py \
            newsroom/tests/test_sdlc_junit_encoding.py \
            newsroom/tests/test_sdlc_junit_evidence.py > broader.log 2>&1
          status=$?
          printf '%s\n' "$status" > broader.status
          exit 0
      - name: Check diff
        shell: bash
        run: |
          set +e
          git diff --check > diff.log 2>&1
          status=$?
          printf '%s\n' "$status" > diff.status
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: sdlc-receipt-qualification-${{ github.sha }}
          path: |
            focused.log
            focused.status
            broader.log
            broader.status
            diff.log
            diff.status
          if-no-files-found: error
          retention-days: 1
      - name: Preserve qualification result
        shell: bash
        run: |
          test "$(cat focused.status)" = 0
          test "$(cat broader.status)" = 0
          test "$(cat diff.status)" = 0
      - name: Commit and push source checkpoint
        if: steps.patch.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/sdlc/artifact_receipt.py newsroom/tests/test_sdlc_artifact_receipt.py
          git commit -m 'fix(sdlc): bind artifact transport and receipt provenance'
          git push origin HEAD:agent/sdlc-v2-phase2a2b-artifact-receipts
