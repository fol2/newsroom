name: SDLC Receipt Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2a2b-artifact-receipts

permissions:
  contents: write

concurrency:
  group: sdlc-receipt-publisher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2a2b-artifact-receipts
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install exact uv
        run: python -m pip install --disable-pip-version-check uv==0.8.0
      - name: Assemble and verify exact patch
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          target_source=fee58776c41d78992078330d2333f251221d30483b46cbb9d4a55a5c745c6ddc
          target_test=11fb8f219619e911b6d545d7699788a77525ac7dfbef12526e94e3b6999b2e29
          current_source=$(sha256sum scripts/sdlc/artifact_receipt.py | cut -d' ' -f1)
          current_test=$(sha256sum newsroom/tests/test_sdlc_artifact_receipt.py | cut -d' ' -f1)
          if [[ "$current_source" == "$target_source" && "$current_test" == "$target_test" ]]; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test "$(sha256sum .sdlc/receipt-fix.part-00a | cut -d' ' -f1)" = 5486eb83d16e08fd38ddcbdf56ec6d8c3735225ce9e43af1b65551566af19def
          test "$(sha256sum .sdlc/receipt-fix.part-00b | cut -d' ' -f1)" = 36f5b2e74094b2938b7b0bcecd1d9a87cfd3993aeb5048f21fb57fa215adf46a
          test "$(sha256sum .sdlc/receipt-fix.part-00c | cut -d' ' -f1)" = 19363d4660a7ef12417973275e804c523ae0584ccf41cb304212f5dcf6367b81
          test "$(sha256sum .sdlc/receipt-fix.part-00d | cut -d' ' -f1)" = 0fa51276d0aafcb7b8ff82529f3d71f02454f5c0df8c82c92cbd778aa86c25a7
          test "$(sha256sum .sdlc/receipt-fix.part-00e | cut -d' ' -f1)" = fafa5be80fde1d21a6976a92b93208bbdd1d4f84d42492042f577eba53796186
          test "$(sha256sum .sdlc/receipt-fix.part-01 | cut -d' ' -f1)" = 06ed71e21964c3700e744c98bcd2c10a7e49c51d871e4b486a32fa603e1a7abb
          test "$(sha256sum .sdlc/receipt-fix.part-02 | cut -d' ' -f1)" = 463bc4ba5d3697e9b1eb8e4395abd16a79324ff99cd5ea83ca81ceb30bfd9824
          test "$(sha256sum .sdlc/receipt-fix.part-03 | cut -d' ' -f1)" = acdcefa58dffbd0b803a7c26536c135df694a0b823d1ac1396e3e3027490739f
          test "$(sha256sum .sdlc/receipt-fix.part-04 | cut -d' ' -f1)" = c409d8ab391eabc50e404e6309d28ea01aea29211119faae75f3528a0f5a8c8e
          cat .sdlc/receipt-fix.part-00a .sdlc/receipt-fix.part-00b .sdlc/receipt-fix.part-00c .sdlc/receipt-fix.part-00d .sdlc/receipt-fix.part-00e > receipt-fix.part-00
          test "$(wc -c < receipt-fix.part-00)" = 5000
          test "$(sha256sum receipt-fix.part-00 | cut -d' ' -f1)" = 79319fcc5bce9d374b4ac4d6498d397edd681af49837ff478d59e7c0508a7e9d
          cat receipt-fix.part-00 .sdlc/receipt-fix.part-01 .sdlc/receipt-fix.part-02 .sdlc/receipt-fix.part-03 .sdlc/receipt-fix.part-04 > receipt-fix.patch.gz.b64
          test "$(sha256sum receipt-fix.patch.gz.b64 | cut -d' ' -f1)" = 2852a91797220ab2e5cfcd446610b10af3a4024179c509cfbf66f99e744d99f3
          base64 --decode receipt-fix.patch.gz.b64 > receipt-fix.patch.gz
          test "$(sha256sum receipt-fix.patch.gz | cut -d' ' -f1)" = 9be12f50022eb03b09754ab3ba8282ba75e05e7ffe13a9d5b0c2964f1f7eb861
          gzip --decompress --stdout receipt-fix.patch.gz > receipt-fix.patch
          test "$(sha256sum receipt-fix.patch | cut -d' ' -f1)" = 824f4a72f026ecf663ef0f1da513d389fab457d902636bf0c04bfd74f21adede
          git apply --check receipt-fix.patch
          git apply receipt-fix.patch
          test "$(sha256sum scripts/sdlc/artifact_receipt.py | cut -d' ' -f1)" = "$target_source"
          test "$(sha256sum newsroom/tests/test_sdlc_artifact_receipt.py | cut -d' ' -f1)" = "$target_test"
          echo 'changed=true' >> "$GITHUB_OUTPUT"
      - name: Sync locked environment
        run: uv sync --dev --locked
      - name: Qualify source on Python 3.12
        shell: bash
        run: |
          set -euo pipefail
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_artifact_receipt.py
          uv run python -m pytest -q \
            newsroom/tests/test_sdlc_artifact_envelope.py \
            newsroom/tests/test_sdlc_classifier.py \
            newsroom/tests/test_sdlc_command_spec.py \
            newsroom/tests/test_sdlc_contract.py \
            newsroom/tests/test_sdlc_dependencies.py \
            newsroom/tests/test_sdlc_dependency_routing.py \
            newsroom/tests/test_sdlc_evidence.py \
            newsroom/tests/test_sdlc_exact_checkout.py \
            newsroom/tests/test_sdlc_junit_encoding.py \
            newsroom/tests/test_sdlc_junit_evidence.py
          git diff --check
      - name: Commit and push source checkpoint
        if: steps.patch.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/sdlc/artifact_receipt.py newsroom/tests/test_sdlc_artifact_receipt.py
          git commit -m 'fix(sdlc): bind artifact transport and receipt provenance'
          git push origin HEAD:agent/sdlc-v2-phase2a2b-artifact-receipts
