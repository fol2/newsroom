name: SDLC Receipt Diagnostics

on:
  push:
    branches:
      - agent/sdlc-v2-phase2a2b-artifact-receipts
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sdlc-receipt-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-transport:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2a2b-artifact-receipts
          fetch-depth: 1
          show-progress: false
      - name: Verify chunk 0
        run: test "$(sha256sum .sdlc/receipt-fix.patch.gz.b64 | cut -d' ' -f1)" = 79319fcc5bce9d374b4ac4d6498d397edd681af49837ff478d59e7c0508a7e9d
      - name: Verify chunk 1
        run: test "$(sha256sum .sdlc/receipt-fix.part-01 | cut -d' ' -f1)" = 06ed71e21964c3700e744c98bcd2c10a7e49c51d871e4b486a32fa603e1a7abb
      - name: Verify chunk 2
        run: test "$(sha256sum .sdlc/receipt-fix.part-02 | cut -d' ' -f1)" = 463bc4ba5d3697e9b1eb8e4395abd16a79324ff99cd5ea83ca81ceb30bfd9824
      - name: Verify chunk 3
        run: test "$(sha256sum .sdlc/receipt-fix.part-03 | cut -d' ' -f1)" = acdcefa58dffbd0b803a7c26536c135df694a0b823d1ac1396e3e3027490739f
      - name: Verify chunk 4
        run: test "$(sha256sum .sdlc/receipt-fix.part-04 | cut -d' ' -f1)" = c409d8ab391eabc50e404e6309d28ea01aea29211119faae75f3528a0f5a8c8e
      - name: Assemble encoded patch
        run: cat .sdlc/receipt-fix.patch.gz.b64 .sdlc/receipt-fix.part-01 .sdlc/receipt-fix.part-02 .sdlc/receipt-fix.part-03 .sdlc/receipt-fix.part-04 > receipt-fix.patch.gz.b64
      - name: Verify encoded patch
        run: test "$(sha256sum receipt-fix.patch.gz.b64 | cut -d' ' -f1)" = 2852a91797220ab2e5cfcd446610b10af3a4024179c509cfbf66f99e744d99f3
      - name: Decode and verify gzip
        run: |
          base64 --decode receipt-fix.patch.gz.b64 > receipt-fix.patch.gz
          test "$(sha256sum receipt-fix.patch.gz | cut -d' ' -f1)" = 9be12f50022eb03b09754ab3ba8282ba75e05e7ffe13a9d5b0c2964f1f7eb861
      - name: Expand and verify patch
        run: |
          gzip --decompress --stdout receipt-fix.patch.gz > receipt-fix.patch
          test "$(sha256sum receipt-fix.patch | cut -d' ' -f1)" = 824f4a72f026ecf663ef0f1da513d389fab457d902636bf0c04bfd74f21adede
      - name: Verify patch applies
        run: git apply --check receipt-fix.patch
