name: SDLC Receipt Diagnostics

on:
  push:
    branches:
      - agent/sdlc-v2-phase2a2b-artifact-receipts
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sdlc-receipt-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.8.0
      - name: Sync locked environment
        run: uv sync --dev --locked
      - name: Capture focused pytest output
        id: pytest
        shell: bash
        run: |
          set +e
          uv run python -m pytest -vv --tb=long newsroom/tests/test_sdlc_artifact_receipt.py > receipt-pytest.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sdlc-receipt-diagnostics-${{ github.sha }}
          path: receipt-pytest.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve focused result
        shell: bash
        run: exit "${{ steps.pytest.outputs.status }}"
