name: SDLC Phase 2B1c2a Lane Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b1c2-shadow-decision
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sdlc-phase2b1c2a-publisher-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b1c2-shadow-decision
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact service route fix
        run: |
          set -euo pipefail
          test "$(git hash-object .sdlc/shadow-lane-route-fix.py)" = b66e3c6197818a5946954ceb13a2a816a5648909
          test "$(git hash-object scripts/sdlc/shadow_lane.py)" = 96a4771f83428e2e0d09d3439a055431ff9a2413
          test "$(git hash-object newsroom/tests/test_sdlc_shadow_lane.py)" = 6ae6f48a5040bebc8b31d59f201986fafc561c7d
          python -m py_compile .sdlc/shadow-lane-route-fix.py
          python .sdlc/shadow-lane-route-fix.py

      - name: Install exact uv and sync locked environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify lane boundary
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_shadow_lane.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit and push source-only checkpoint
        run: |
          set -euo pipefail
          rm -f .sdlc/shadow-lane-route-fix.py .sdlc/shadow-lane-route-fix.trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/sdlc/shadow_lane.py newsroom/tests/test_sdlc_shadow_lane.py .sdlc/shadow-lane-route-fix.py .sdlc/shadow-lane-route-fix.trigger
          git commit -m 'fix(sdlc): require routed service evidence'
          git push origin HEAD:agent/sdlc-v2-phase2b1c2-shadow-decision || true
          test "$(git ls-remote origin refs/heads/agent/sdlc-v2-phase2b1c2-shadow-decision | cut -f1)" = "$(git rev-parse HEAD)"
