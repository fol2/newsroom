name: SDLC Phase 2B1c2a Lane Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b1c2-shadow-decision
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sdlc-phase2b1c2a-publisher-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b1c2-shadow-decision
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact review fixes
        run: |
          set -euo pipefail
          test "$(git hash-object .sdlc/shadow-lane-review-fixes.py)" = 8a958aba5ac6e7712386428b5f56e131997acaaa
          test "$(git hash-object scripts/sdlc/shadow_lane.py)" = d03f86947a47ed8aece649bed8304f96c472a535
          test "$(git hash-object newsroom/tests/test_sdlc_shadow_lane.py)" = d782d73e98cd26dd7e8aa0c0132a66ef37d6662b
          python -m py_compile .sdlc/shadow-lane-review-fixes.py
          python .sdlc/shadow-lane-review-fixes.py

      - name: Install exact uv and sync locked environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify lane boundary
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_shadow_lane.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit and push source-only checkpoint
        run: |
          set -euo pipefail
          rm -f .sdlc/shadow-lane-review-fixes.py .sdlc/shadow-lane-review-fixes.trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/sdlc/shadow_lane.py newsroom/tests/test_sdlc_shadow_lane.py .sdlc/shadow-lane-review-fixes.py .sdlc/shadow-lane-review-fixes.trigger
          git commit -m 'fix(sdlc): harden shadow lane evidence'
          git push origin HEAD:agent/sdlc-v2-phase2b1c2-shadow-decision
