name: B3 Active Promotion Publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/increment-1b3-rebuild-promotion'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Apply deterministic active-promotion hardening
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          python - <<'PY'
          from pathlib import Path

          store_path = Path("newsroom/authority/_projection_store.py")
          store = store_path.read_text(encoding="utf-8")
          store_old = '''            if result.replayed:
                          return self._generation_version_for_event(conn, result.event_id)
                      current = self._generation_row(conn, str(generation_id))
          '''
          store_new = '''            if result.replayed:
                          return self._generation_version_for_event(conn, result.event_id)
                      if target_state is ProjectionGenerationState.ACTIVE:
                          raise ProjectionStateError(
                              "ACTIVE generation requires authority promotion"
                          )
                      current = self._generation_row(conn, str(generation_id))
          '''
          if store.count(store_old) != 1:
              raise SystemExit("unexpected direct transition source shape")
          store_path.write_text(store.replace(store_old, store_new, 1), encoding="utf-8")

          b1_path = Path("newsroom/tests/test_projection_b1_authority.py")
          b1 = b1_path.read_text(encoding="utf-8")
          b1_start = b1.index(
              "def test_one_active_generation_per_family_is_enforced_before_commit("
          )
          b1_end = b1.index(
              "def test_required_unsupported_event_creates_dead_letter_and_gap(",
              b1_start,
          )
          b1_replacement = '''def test_direct_active_transition_requires_authority_promotion_before_commit(
              tmp_path: Path,
          ) -> None:
              system = open_projection_system(tmp_path / "authority.sqlite3")
              try:
                  _, generation = _register_and_create(system)
                  validating = system.projections.transition_generation(
                      ProjectionGenerationTransitionRequest(
                          generation.generation_id,
                          generation.authority_aggregate_version,
                          ProjectionGenerationState.VALIDATING,
                          "LEGACY_VALIDATING",
                          "legacy-validating",
                          validated_through_ledger_seq=0,
                      ),
                      proof=proof(),
                  )
                  before_events = system.events.after(0, limit=100, proof=proof())

                  with pytest.raises(ProjectionStateError, match="authority promotion"):
                      system.projections.transition_generation(
                          ProjectionGenerationTransitionRequest(
                              generation.generation_id,
                              validating.authority_aggregate_version,
                              ProjectionGenerationState.ACTIVE,
                              "DIRECT_ACTIVE_FORBIDDEN",
                              "direct-active-forbidden",
                              validated_through_ledger_seq=0,
                          ),
                          proof=proof(),
                      )

                  assert system.events.after(0, limit=100, proof=proof()) == before_events
                  current = system.projections.generations(FAMILY_ID, proof=proof())[0]
                  assert current.state is ProjectionGenerationState.VALIDATING
                  assert current.authority_aggregate_version == (
                      validating.authority_aggregate_version
                  )
              finally:
                  system.close()


          '''
          b1_path.write_text(
              b1[:b1_start] + b1_replacement + b1[b1_end:],
              encoding="utf-8",
          )

          b3_path = Path("newsroom/tests/test_projection_b3_authority.py")
          b3 = b3_path.read_text(encoding="utf-8")
          import_old = '''    ProjectionGenerationPromotionRequest,
              ProjectionGenerationState,
              ProjectionGenerationValidationRequest,
          '''
          import_new = '''    ProjectionGenerationPromotionRequest,
              ProjectionGenerationState,
              ProjectionGenerationTransitionRequest,
              ProjectionGenerationValidationRequest,
          '''
          if b3.count(import_old) != 1:
              raise SystemExit("unexpected B3 import shape")
          b3 = b3.replace(import_old, import_new, 1)
          marker = "def test_validation_evidence_is_exact_typed_and_replayable(tmp_path: Path) -> None:\n"
          if b3.count(marker) != 1:
              raise SystemExit("unexpected B3 test insertion point")
          b3_test = '''def test_direct_active_transition_cannot_bypass_authority_promotion(
              tmp_path: Path,
          ) -> None:
              system = open_projection_system(tmp_path / "authority.sqlite3")
              try:
                  _register(system)
                  created = _create(system, "generation-create-direct-active")
                  validating = system.projections.transition_generation(
                      ProjectionGenerationTransitionRequest(
                          created.generation_id,
                          created.authority_aggregate_version,
                          ProjectionGenerationState.VALIDATING,
                          "LEGACY_VALIDATING",
                          "generation-legacy-validating",
                          validated_through_ledger_seq=0,
                      ),
                      proof=proof(),
                  )
                  before_events = system.events.after(0, limit=100, proof=proof())

                  with pytest.raises(ProjectionStateError, match="authority promotion"):
                      system.projections.transition_generation(
                          ProjectionGenerationTransitionRequest(
                              validating.generation_id,
                              validating.authority_aggregate_version,
                              ProjectionGenerationState.ACTIVE,
                              "DIRECT_ACTIVE_FORBIDDEN",
                              "generation-direct-active-forbidden",
                              validated_through_ledger_seq=0,
                          ),
                          proof=proof(),
                      )

                  assert system.events.after(0, limit=100, proof=proof()) == before_events
                  after_rejection = next(
                      item
                      for item in system.projections.generations(FAMILY_ID, proof=proof())
                      if item.generation_id == created.generation_id
                  )
                  assert after_rejection.state is ProjectionGenerationState.VALIDATING
                  assert after_rejection.authority_aggregate_version == (
                      validating.authority_aggregate_version
                  )

                  validation = _validate(
                      system,
                      after_rejection,
                      "generation-validate-after-direct-active",
                  )
                  validated = next(
                      item
                      for item in system.projections.generations(FAMILY_ID, proof=proof())
                      if item.generation_id == created.generation_id
                  )
                  promotion = _promote(
                      system,
                      validated,
                      validation,
                      "generation-promote-after-direct-active",
                  )
                  assert promotion.generation.state is ProjectionGenerationState.ACTIVE
              finally:
                  system.close()


          '''
          b3_path.write_text(b3.replace(marker, b3_test + marker, 1), encoding="utf-8")
          PY
          rm .github/b3-active-promotion.patch
          rm .github/workflows/b3-active-promotion-publisher.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Qualify authority promotion hardening
        run: |
          uv lock --check
          uv sync --dev --locked
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_authority_*.py \
            newsroom/tests/test_projection_b1_*.py \
            newsroom/tests/test_projection_b2_*.py \
            newsroom/tests/test_projection_b3_*.py

      - name: Commit and push source-only hardening
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          ! git diff --cached --name-only | grep -E '(^|/)(b3-active-promotion|b3-active-promotion-publisher)'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(projection): require authority promotion for activation"
          git push origin HEAD:agent/increment-1b3-rebuild-promotion
