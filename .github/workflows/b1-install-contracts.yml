name: Install verified B1 graph contracts

on:
  push:
    branches:
      - agent/increment-1b1-graph-contracts
    paths:
      - .github/b1-contract-source/**
      - .github/workflows/b1-install-contracts.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/b1-contract-source/**
      - .github/workflows/b1-install-contracts.yml

permissions:
  contents: write

concurrency:
  group: b1-install-contracts
  cancel-in-progress: false

jobs:
  install-and-verify:
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.head_ref == 'agent/increment-1b1-graph-contracts'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: agent/increment-1b1-graph-contracts
          fetch-depth: 0
          persist-credentials: true

      - name: Diagnose and stage exact B1 contracts
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/b1-install.log) 2>&1
          echo "head=$(git rev-parse HEAD)"
          if [[ ! -d .github/b1-contract-source ]]; then
            echo 'B1 contracts already installed.'
            echo 'installed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          find .github/b1-contract-source -maxdepth 1 -type f -name 'part-*' -printf '%f %s\n' | sort
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          root = Path('.github/b1-contract-source')
          expected = [f'part-{index:02d}' for index in range(3)]
          actual = sorted(path.name for path in root.glob('part-*'))
          print(f'actual_parts={actual!r}')
          if actual != expected:
              raise SystemExit(f'part manifest mismatch: {actual!r}')
          encoded = ''.join(
              ''.join((root / name).read_text(encoding='ascii').split())
              for name in expected
          )
          print(f'encoded_chars={len(encoded)}')
          if len(encoded) != 8056:
              raise SystemExit(f'encoded length mismatch: {len(encoded)}')
          archive = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(archive).hexdigest()
          print(f'archive_bytes={len(archive)} sha256={digest}')
          expected_digest = 'd7766a56ed227fa0989b5c7ba8a57894a34ff0b616e32c99cc400422a2fe9803'
          if digest != expected_digest:
              raise SystemExit(f'archive digest mismatch: {digest}')
          Path('/tmp/b1-contracts.tar.xz').write_bytes(archive)
          PY
          xz -dc /tmp/b1-contracts.tar.xz | tar -tf - > /tmp/b1-contracts.list
          echo "archive_entries=$(wc -l < /tmp/b1-contracts.list)"
          if grep -E '(^/|(^|/)\.\.(/|$))' /tmp/b1-contracts.list; then
            echo 'unsafe archive path' >&2
            exit 1
          fi
          xz -dc /tmp/b1-contracts.tar.xz | tar -xf - -C .
          rm -rf .github/b1-contract-source
          git add -A
          git diff --cached --check

          # GITHUB_TOKEN cannot create/delete workflow files. Exclude this
          # one-shot workflow while checking the exact reviewed source tree;
          # the connected GitHub app removes it after the source commit lands.
          git rm --cached --force .github/workflows/b1-install-contracts.yml
          actual_tree="$(git write-tree)"
          echo "actual_tree=$actual_tree"
          echo 'expected_tree=f3021aec2e59c7e649adc8995d875cb287be2297'
          git status --short
          test "$actual_tree" = 'f3021aec2e59c7e649adc8995d875cb287be2297'
          git add .github/workflows/b1-install-contracts.yml

          test -f newsroom/projection/ontology.py
          test -f newsroom/projection/mapping.py
          test -f newsroom/tests/test_projection_b1_contracts.py
          test ! -e .github/b1-contract-source
          echo 'installed=true' >> "$GITHUB_OUTPUT"

      - name: Upload B1 install diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b1-contract-install-diagnostics
          path: |
            /tmp/b1-install.log
            /tmp/b1-contracts.list
            .github/b1-contract-source
          if-no-files-found: warn

      - name: Enforce B1 install gate
        if: steps.install.outcome != 'success'
        run: exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Lockfile check
        run: uv lock --check

      - name: Sync locked development environment
        run: uv sync --dev --locked

      - name: Compile
        run: uv run python -m compileall -q newsroom

      - name: Focused B1 contract tests
        run: |
          uv run python -m pytest -q \
            newsroom/tests/test_projection_b1_contracts.py \
            --junitxml=/tmp/b1-contracts.xml

      - name: Complete repository tests
        run: uv run python -m pytest -q

      - name: Clustering evaluation gate
        run: |
          uv run python scripts/eval_clustering_metrics.py \
            --dataset newsroom/evals/clustering_eval_dataset_v1.jsonl \
            --baseline newsroom/evals/clustering_eval_metrics_baseline_v1.json \
            --fail-on-regression

      - name: Commit and push source-only B1 contracts
        if: steps.install.outputs.installed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(projection): add engine-neutral graph contracts'
          git push origin HEAD:agent/increment-1b1-graph-contracts
