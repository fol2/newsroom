name: Export B1 checkout for local development

on:
  push:
    branches:
      - agent/increment-1b1-graph-contracts
    paths:
      - .github/workflows/b1-export-checkout.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/increment-1b1-graph-contracts
          fetch-depth: 0

      - name: Create deterministic checkout archive
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --prefix=newsroom-b1/ HEAD > /tmp/newsroom-b1-checkout.tar.gz
          sha256sum /tmp/newsroom-b1-checkout.tar.gz > /tmp/newsroom-b1-checkout.sha256

      - name: Upload checkout archive
        uses: actions/upload-artifact@v4
        with:
          name: newsroom-b1-checkout
          path: |
            /tmp/newsroom-b1-checkout.tar.gz
            /tmp/newsroom-b1-checkout.sha256
          if-no-files-found: error
