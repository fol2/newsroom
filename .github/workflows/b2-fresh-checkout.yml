name: B2 Hardening Publisher

on:
  push:
    branches:
      - agent/increment-1b2-neo4j-structural

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify and apply exact hardening patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          echo "5ffdc8af589527b7ab08545664328332d4973483f673c34bf1b015bf81f02bc1  .github/b2-hardening.patch" | sha256sum --check --strict
          git apply --check .github/b2-hardening.patch
          git apply .github/b2-hardening.patch
          rm .github/b2-hardening.patch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Qualify source checkpoint
        run: |
          uv lock --check
          uv sync --dev --locked
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_authority_*.py \
            newsroom/tests/test_projection_b1_*.py \
            newsroom/tests/test_projection_b2_*.py

      - name: Commit and push source hardening
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          test -z "$(git diff --cached --name-only | grep '^.github/workflows/' || true)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(projection): harden Neo4j qualification"
          git push origin HEAD:agent/increment-1b2-neo4j-structural
