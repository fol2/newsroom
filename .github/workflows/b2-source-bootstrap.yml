name: B2 Fresh Source Export

on:
  push:
    branches:
      - agent/increment-1b2-neo4j-structural
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-source:
    if: github.event_name == 'push' || github.head_ref == 'agent/increment-1b2-neo4j-structural'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact tracked checkout
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain=v1)"

      - name: Export exact tracked source
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=b2-fresh-source.tar.gz HEAD
          git rev-parse HEAD > b2-fresh-source-head.txt
          sha256sum b2-fresh-source.tar.gz > b2-fresh-source.tar.gz.sha256

      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: b2-fresh-source-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            b2-fresh-source.tar.gz
            b2-fresh-source.tar.gz.sha256
            b2-fresh-source-head.txt
          if-no-files-found: error
          retention-days: 1
