name: B2 Checkpoint Publisher

on:
  push:
    branches:
      - agent/increment-1b2-neo4j-structural
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'push' || github.head_ref == 'agent/increment-1b2-neo4j-structural'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact transport
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          test "$(find .github/b2-publish -maxdepth 1 -type f -name 'part-*' | wc -l)" -eq 7
          cat .github/b2-publish/part-* > /tmp/b2-checkpoint.tar.gz.b64
          echo "7fd11eb94413e0a0ff93daa3df7e4521c355f3f1b6fcd3e9ea20d3468b24b010  /tmp/b2-checkpoint.tar.gz.b64" | sha256sum --check --strict
          base64 --decode /tmp/b2-checkpoint.tar.gz.b64 > /tmp/b2-checkpoint.tar.gz
          echo "692c3a6c4c52a485812c59dc32540c9a888b548d3e6310d39cf35cb473c2c3dd  /tmp/b2-checkpoint.tar.gz" | sha256sum --check --strict
          tar -tzf /tmp/b2-checkpoint.tar.gz | LC_ALL=C sort > /tmp/b2-actual-files.txt
          cat > /tmp/b2-expected-files.txt <<'EOF'
          .github/workflows/projection-b2-neo4j.yml
          docs/operations/neo4j-b2-qualification.md
          newsroom/authority/_neo4j_projection_system.py
          newsroom/authority/_projection_store.py
          newsroom/authority/_projection_system.py
          newsroom/authority/neo4j_projection_system.py
          newsroom/projection/neo4j/__init__.py
          newsroom/projection/neo4j/_adapter.py
          newsroom/projection/neo4j/models.py
          newsroom/projection/neo4j/traceability.py
          newsroom/tests/projection_b2_helpers.py
          newsroom/tests/test_projection_b2_adapter_unit.py
          newsroom/tests/test_projection_b2_authority.py
          newsroom/tests/test_projection_b2_boundaries.py
          newsroom/tests/test_projection_b2_contracts.py
          newsroom/tests/test_projection_b2_neo4j_service.py
          pyproject.toml
          EOF
          sed -i 's/^          //' /tmp/b2-expected-files.txt
          diff -u /tmp/b2-expected-files.txt /tmp/b2-actual-files.txt

      - name: Materialize source-only checkpoint
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/b2-checkpoint.tar.gz -C .
          rm -rf .github/b2-publish
          rm -f .github/workflows/b2-source-bootstrap.yml
          test ! -e .github/workflows/b2-lock-refresh.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Resolve and verify locked environment
        run: |
          uv lock
          uv lock --check
          uv sync --dev --locked

      - name: Qualify coherent checkpoint
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_authority_*.py \
            newsroom/tests/test_projection_b1_*.py \
            newsroom/tests/test_projection_b2_*.py

      - name: Commit source-only checkpoint
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          ! git diff --cached --name-only | grep -E '(^|/)(b2-publish|b2-source-bootstrap|b2-lock-refresh)'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(projection): add native Neo4j structural adapter"
          git push origin HEAD:agent/increment-1b2-neo4j-structural
