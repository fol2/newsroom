name: B3 Verified Active Promotion Publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/increment-1b3-rebuild-promotion'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify and apply exact source-only hardening
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          echo "8a10de178ccc7a722b60acadf46927099aae1bd7a7cd8fbf7b2ac12a16734579  .github/b3-active-promotion-good.patch.gz.b64" | sha256sum --check --strict
          base64 --decode .github/b3-active-promotion-good.patch.gz.b64 > /tmp/b3-active-promotion.patch.gz
          echo "0caf8de4958f4ab3b8bbf915ef5c1e402e8cd737141ee4093d3bd354f564f2ef  /tmp/b3-active-promotion.patch.gz" | sha256sum --check --strict
          gzip --decompress --stdout /tmp/b3-active-promotion.patch.gz > /tmp/b3-active-promotion.patch
          echo "99cd113520462202fc6934d15b4a765c0e67b8a7555a2b41c36fee6a683712cd  /tmp/b3-active-promotion.patch" | sha256sum --check --strict
          git apply --check /tmp/b3-active-promotion.patch
          git apply /tmp/b3-active-promotion.patch
          rm .github/b3-active-promotion-good.patch.gz.b64
          rm .github/workflows/b3-active-promotion-good-publisher.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Qualify authority promotion hardening
        run: |
          uv lock --check
          uv sync --dev --locked
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_authority_*.py \
            newsroom/tests/test_projection_b1_*.py \
            newsroom/tests/test_projection_b2_*.py \
            newsroom/tests/test_projection_b3_*.py

      - name: Commit and push source-only checkpoint
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          ! git diff --cached --name-only | grep -E '(^|/)(b3-active-promotion|b3-fresh-checkout)'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(projection): require authority promotion for activation"
          git push origin HEAD:agent/increment-1b3-rebuild-promotion
