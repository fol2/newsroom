name: SDLC Workflow Orchestrator Review Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-evidence-workflow

permissions:
  contents: write

concurrency:
  group: sdlc-workflow-orchestrator-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-evidence-workflow
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact current-head review fixes
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_orchestrator.py)" = df75c94f849b14c22ce67d99c9c9703d4ffa7ae5
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_orchestrator.py)" = ebc136ddaf0094901f6fc1e71bdc8e1cb45932d4
          test "$(git hash-object .sdlc/workflow-orchestrator-review-fixes.py)" = b9856248248a19456b8b52a2d0886beaf479762a
          python .sdlc/workflow-orchestrator-review-fixes.py
          python -m py_compile \
            scripts/sdlc/workflow_orchestrator.py \
            newsroom/tests/test_sdlc_workflow_orchestrator.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify current-head review fixes
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_workflow_orchestrator.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only reviewed head
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/sdlc-workflow-orchestrator-review-publisher.yml \
            .sdlc/workflow-orchestrator-review-fixes.py
          git add \
            scripts/sdlc/workflow_orchestrator.py \
            newsroom/tests/test_sdlc_workflow_orchestrator.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): bound collection and decision failures'
          git push origin HEAD:agent/sdlc-v2-phase2b-evidence-workflow
