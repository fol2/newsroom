name: B3 Fresh Checkout Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/increment-1b3-rebuild-promotion'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkout
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          test -z "$(git status --porcelain=v1)"

      - name: Export tracked source
        run: |
          git archive --format=tar.gz --output=b3-fresh-checkout.tar.gz HEAD
          git rev-parse HEAD > b3-fresh-checkout-head.txt
          sha256sum b3-fresh-checkout.tar.gz > b3-fresh-checkout.tar.gz.sha256

      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: b3-fresh-checkout-${{ github.event.pull_request.head.sha }}
          path: |
            b3-fresh-checkout.tar.gz
            b3-fresh-checkout.tar.gz.sha256
            b3-fresh-checkout-head.txt
          if-no-files-found: error
          retention-days: 1
