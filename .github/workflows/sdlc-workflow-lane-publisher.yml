name: SDLC Workflow Lane Source Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-shadow-workflow

permissions:
  contents: write

concurrency:
  group: sdlc-workflow-lane-publisher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-shadow-workflow
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Reconstruct exact lane source
        shell: bash
        run: |
          set -euo pipefail
          test ! -e scripts/sdlc/workflow_lane.py
          test ! -e newsroom/tests/test_sdlc_workflow_lane.py
          test "$(sha256sum .sdlc/workflow-lane.payload.b64 | cut -d' ' -f1)" = 460d379c07b20b58ef87c6f99592d319b9e659984a0b0225d1f2dd358e6da8d2
          base64 --decode .sdlc/workflow-lane.payload.b64 > workflow-lane.tar.gz
          test "$(sha256sum workflow-lane.tar.gz | cut -d' ' -f1)" = e8cde419de2266b8a60c2006811fa11b04fe1be215a5e61d069e0120069697c7
          test "$(tar -tzf workflow-lane.tar.gz | sort | tr '\n' ' ')" = 'test_workflow_lane.py workflow_lane.py '
          mkdir lane-source
          tar -xzf workflow-lane.tar.gz -C lane-source
          test "$(sha256sum lane-source/workflow_lane.py | cut -d' ' -f1)" = 9ef90d293d038b59e9ed1af32b466f87f5a1f732b42938f7f7a03cd247687977
          test "$(sha256sum lane-source/test_workflow_lane.py | cut -d' ' -f1)" = 948e1e0d62846e552faac202e6b23164c8b7bdf13d542f8e4cc9ff1172a82de4
          install -m 0600 lane-source/workflow_lane.py scripts/sdlc/workflow_lane.py
          install -m 0600 lane-source/test_workflow_lane.py newsroom/tests/test_sdlc_workflow_lane.py
          python -m py_compile scripts/sdlc/workflow_lane.py newsroom/tests/test_sdlc_workflow_lane.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify shared-deadline lane
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_workflow_lane.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only lane checkpoint
        shell: bash
        run: |
          set -euo pipefail
          rm -rf lane-source workflow-lane.tar.gz
          git rm -f .github/workflows/sdlc-workflow-lane-publisher.yml .sdlc/workflow-lane.payload.b64
          git add scripts/sdlc/workflow_lane.py newsroom/tests/test_sdlc_workflow_lane.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(sdlc): run exact shared-deadline shadow lanes'
          git push origin HEAD:agent/sdlc-v2-phase2b-shadow-workflow
