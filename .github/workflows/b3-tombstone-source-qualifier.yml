name: B3 Tombstone Source Qualifier

on:
  push:
    branches:
      - agent/increment-1b3-rebuild-promotion
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: b3-tombstone-source-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  qualify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/increment-1b3-rebuild-promotion
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Set up exact uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: '0.8.0'
          enable-cache: true
          cache-dependency-glob: uv.lock
          github-token: ''

      - name: Verify input and apply deterministic transform
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="${RUNNER_TEMP}/b3-tombstone-qualification.log"
          set +e
          (
            set -euo pipefail
            git merge-base --is-ancestor f43de049b9e0a95f7d38fe26e6c8491385eb673e HEAD
            test "$(git hash-object .sdlc/add-b3-tombstone-projection-v2.py)" = 478a55ac79f796b61292f2a90667923c9c91befb
            test "$(git hash-object .sdlc/fix-b3-tombstone-v2-output.py)" = 879b6eea80a09627839b826cfe949729d061fc7b
            test "$(git hash-object .sdlc/fix-b3-tombstone-v2-output-2.py)" = 45f428b807baf07e9c060487f84bcf32d48a3ba3
            test "$(git hash-object .sdlc/fix-b3-tombstone-v2-output-3.py)" = 269427ceaf73f0cefa74c9bdbbdb4841182f5427
            uv lock --check
            uv sync --dev --locked
            uv run --no-sync python .sdlc/add-b3-tombstone-projection-v2.py
            uv run --no-sync python .sdlc/fix-b3-tombstone-v2-output.py
            uv run --no-sync python .sdlc/fix-b3-tombstone-v2-output-2.py
            uv run --no-sync python .sdlc/fix-b3-tombstone-v2-output-3.py
            uv run --no-sync python -m compileall -q newsroom scripts
            uv run --no-sync python -m pytest -q \
              newsroom/tests/test_authority_a2b_lifecycle.py \
              newsroom/tests/test_authority_a2b_object_commands.py \
              newsroom/tests/test_projection_b1_contracts.py \
              newsroom/tests/test_projection_b2_adapter_unit.py \
              newsroom/tests/test_projection_b3_rebuild.py \
              newsroom/tests/test_projection_b3_tombstone.py \
              newsroom/tests/test_projection_b3_neo4j_service.py \
              newsroom/tests/test_sdlc_classifier.py \
              newsroom/tests/test_sdlc_workflow_lane.py
            uv run --no-sync python -m pytest -q newsroom/tests
            git diff --check
          ) > "${diagnostic}" 2>&1
          status="$?"
          set -e
          if test "${status}" -ne 0; then
            tail -n 220 "${diagnostic}"
            exit "${status}"
          fi

      - name: Upload qualification diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: newsroom-b3-tombstone-diagnostic-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: ${{ runner.temp }}/b3-tombstone-qualification.log
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Build exact source artifact
        shell: bash
        run: |
          set -euo pipefail
          out="${RUNNER_TEMP}/b3-tombstone-source"
          mkdir -p "${out}/files"
          cat > "${out}/expected-paths.txt" <<'EOF'
          .github/workflows/projection-b2-neo4j.yml
          newsroom/authority/_neo4j_projection_system.py
          newsroom/authority/_projection_store.py
          newsroom/projection/mapping.py
          newsroom/projection/neo4j/_adapter.py
          newsroom/projection/neo4j/models.py
          newsroom/tests/projection_b3_tombstone_helpers.py
          newsroom/tests/test_projection_b3_neo4j_service.py
          newsroom/tests/test_projection_b3_tombstone.py
          newsroom/tests/test_sdlc_workflow_lane.py
          scripts/sdlc/workflow_lane.py
          EOF
          {
            git diff --name-only --diff-filter=ACMRTUXB --no-renames HEAD
            git ls-files --others --exclude-standard
          } | LC_ALL=C sort -u > "${out}/paths.txt"
          LC_ALL=C sort -o "${out}/expected-paths.txt" "${out}/expected-paths.txt"
          cmp "${out}/expected-paths.txt" "${out}/paths.txt"
          test -z "$(git diff --name-only --diff-filter=D --no-renames HEAD)"
          git status --short --untracked-files=all > "${out}/status.txt"
          while IFS= read -r path; do
            test -f "${path}"
            mkdir -p "${out}/files/$(dirname "${path}")"
            cp -- "${path}" "${out}/files/${path}"
          done < "${out}/paths.txt"
          (
            cd "${out}/files"
            find . -type f -print0 | sort -z | xargs -0 sha256sum
          ) > "${out}/sha256sum.txt"
          printf '%s\n' \
            'base_head=f43de049b9e0a95f7d38fe26e6c8491385eb673e' \
            'transform_blob=478a55ac79f796b61292f2a90667923c9c91befb' \
            'repair_blob=879b6eea80a09627839b826cfe949729d061fc7b' \
            'event_repair_blob=45f428b807baf07e9c060487f84bcf32d48a3ba3' \
            'integrity_repair_blob=269427ceaf73f0cefa74c9bdbbdb4841182f5427' \
            'python=3.12' \
            'uv=0.8.0' > "${out}/qualification.txt"

      - name: Upload exact verified source
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: newsroom-b3-tombstone-source-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: ${{ runner.temp }}/b3-tombstone-source
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: false
          include-hidden-files: true
