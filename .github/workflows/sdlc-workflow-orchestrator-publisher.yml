name: SDLC Workflow Orchestrator Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-evidence-workflow

permissions:
  contents: write

concurrency:
  group: sdlc-workflow-orchestrator-publisher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-evidence-workflow
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact reviewed orchestration hardening
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_orchestrator.py)" = 06a450e6c1fd68d0a3aad34c68f92a5e60ecb528
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_orchestrator.py)" = 67a2ef1b5f183343ed4f6d08e47a51824fcffb7a
          test "$(git hash-object .sdlc/workflow-orchestrator-hardening.py)" = 60206c4a69d3f54517b1ae9f1047a3e92cdbc50c
          python .sdlc/workflow-orchestrator-hardening.py
          python -m py_compile \
            scripts/sdlc/workflow_orchestrator.py \
            newsroom/tests/test_sdlc_workflow_orchestrator.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify orchestration hardening
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_workflow_orchestrator.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only orchestration hardening
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/sdlc-workflow-orchestrator-publisher.yml \
            .sdlc/workflow-orchestrator-hardening.py
          git add \
            scripts/sdlc/workflow_orchestrator.py \
            newsroom/tests/test_sdlc_workflow_orchestrator.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): harden always-reporting orchestration'
          git push origin HEAD:agent/sdlc-v2-phase2b-evidence-workflow
