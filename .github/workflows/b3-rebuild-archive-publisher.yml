name: B3 Verified Rebuild Publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/increment-1b3-rebuild-promotion'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact rebuild archive
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          test "$(find .github/b3-rebuild-archive -maxdepth 1 -type f -name 'part-*' | wc -l | tr -d ' ')" = 8
          cat .github/b3-rebuild-archive/part-* > /tmp/b3-rebuild-unit.tar.gz.b64
          echo "1754c58b1f5891a0be816d927066d9f0408511b6ca05c22579ed439c7f8ea6b8  /tmp/b3-rebuild-unit.tar.gz.b64" | sha256sum --check --strict
          base64 --decode /tmp/b3-rebuild-unit.tar.gz.b64 > /tmp/b3-rebuild-unit.tar.gz
          echo "b8408cab6bd34edb23fa728c1b777527cd76e1e29ac9504a4c5268fc211b6bd5  /tmp/b3-rebuild-unit.tar.gz" | sha256sum --check --strict
          tar -tzf /tmp/b3-rebuild-unit.tar.gz | LC_ALL=C sort > /tmp/b3-rebuild-actual.txt
          cat > /tmp/b3-rebuild-expected.txt <<'EOF'
          newsroom/authority/_neo4j_projection_system.py
          newsroom/authority/_projection_store.py
          newsroom/authority/_projection_system.py
          newsroom/projection/neo4j/__init__.py
          newsroom/projection/neo4j/models.py
          newsroom/projection/policy.py
          newsroom/tests/projection_b2_helpers.py
          newsroom/tests/test_projection_b2_boundaries.py
          newsroom/tests/test_projection_b3_rebuild.py
          EOF
          sed -i 's/^          //' /tmp/b3-rebuild-expected.txt
          diff -u /tmp/b3-rebuild-expected.txt /tmp/b3-rebuild-actual.txt

      - name: Materialize source-only rebuild unit
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/b3-rebuild-unit.tar.gz -C .
          rm -rf .github/b3-rebuild-archive
          rm .github/workflows/b3-rebuild-archive-publisher.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Qualify coherent rebuild unit
        run: |
          uv lock --check
          uv sync --dev --locked
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_authority_*.py \
            newsroom/tests/test_projection_b1_*.py \
            newsroom/tests/test_projection_b2_*.py \
            newsroom/tests/test_projection_b3_*.py

      - name: Commit and push source-only rebuild unit
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          ! git diff --cached --name-only | grep -E '(^|/)(b3-rebuild-archive|b3-rebuild-archive-publisher)'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(projection): add restartable structural rebuild"
          git push origin HEAD:agent/increment-1b3-rebuild-promotion
