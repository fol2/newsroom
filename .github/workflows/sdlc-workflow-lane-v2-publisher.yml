name: SDLC Workflow Lane Review Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-shadow-workflow

permissions:
  contents: write

concurrency:
  group: sdlc-workflow-lane-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-shadow-workflow
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Reconstruct reviewed lane source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_lane.py)" = 0305d2cebca4b53b48e054e5c5690de6b2208c93
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_lane.py)" = ac6e7488fd666736f22fb24dcf53721ee6427c1f
          test "$(sha256sum .sdlc/workflow-lane-v2.payload.b64 | cut -d' ' -f1)" = 73d849955af8bd4a4dae7ff447f5e51c59e2aa8a8fde086baca19e64f32100b3
          base64 --decode .sdlc/workflow-lane-v2.payload.b64 > workflow-lane-v2.tar.gz
          test "$(sha256sum workflow-lane-v2.tar.gz | cut -d' ' -f1)" = e1575140d859c1ee86fc7bd831a3cdb8592bdd92d4854e914f3ec38efeab3f8e
          test "$(tar -tzf workflow-lane-v2.tar.gz | sort | tr '\n' ' ')" = 'test_workflow_lane.py workflow_lane.py '
          mkdir lane-source
          tar -xzf workflow-lane-v2.tar.gz -C lane-source
          test "$(sha256sum lane-source/workflow_lane.py | cut -d' ' -f1)" = cc9fc8e0903b095a6228761686183936531b81e9954a173c1addb9982e84e861
          test "$(sha256sum lane-source/test_workflow_lane.py | cut -d' ' -f1)" = 473996d43e6b1c0c2ff4970f2ef5e42d06c95a0950ea4cac69d314d15be893ce
          install -m 0600 lane-source/workflow_lane.py scripts/sdlc/workflow_lane.py
          install -m 0600 lane-source/test_workflow_lane.py newsroom/tests/test_sdlc_workflow_lane.py
          python -m py_compile scripts/sdlc/workflow_lane.py newsroom/tests/test_sdlc_workflow_lane.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify reviewed lane runtime
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_workflow_lane.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only review correction
        shell: bash
        run: |
          set -euo pipefail
          rm -rf lane-source workflow-lane-v2.tar.gz
          git rm -f .github/workflows/sdlc-workflow-lane-v2-publisher.yml .sdlc/workflow-lane-v2.payload.b64
          git add scripts/sdlc/workflow_lane.py newsroom/tests/test_sdlc_workflow_lane.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): separate lane execution and finalisation'
          git push origin HEAD:agent/sdlc-v2-phase2b-shadow-workflow
