name: SDLC Cache Telemetry Review Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-cache-telemetry

permissions:
  contents: write

concurrency:
  group: sdlc-cache-telemetry-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-cache-telemetry
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact cache telemetry review fix
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_lane.py)" = e63368379bbf5858626d8b59736545eebc0f88fe
          test "$(git hash-object scripts/sdlc/workflow_budget.py)" = e0176fa678160c2c9740ff814f13bdeb5df2bdcb
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_lane.py)" = 5537172b6a79fde3868f5dc05d247eae734d51a4
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_budget.py)" = 978a23e2cbc920ea879c71f275592e7bf9cb31c8
          test "$(git hash-object .sdlc/cache-telemetry-review-fix.py)" = b9f334c655ec02359378a655a736aeb6dc50014d
          python .sdlc/cache-telemetry-review-fix.py
          python -m py_compile \
            scripts/sdlc/workflow_lane.py \
            scripts/sdlc/workflow_budget.py \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_budget.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify reviewed cache telemetry
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_budget.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only reviewed head
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/sdlc-cache-telemetry-review-publisher.yml \
            .sdlc/cache-telemetry-review-fix.py
          git add \
            scripts/sdlc/workflow_lane.py \
            scripts/sdlc/workflow_budget.py \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_budget.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): align cache telemetry evidence bounds'
          git push origin HEAD:agent/sdlc-v2-phase2b-cache-telemetry
