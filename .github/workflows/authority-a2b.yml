name: Authority A2b

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: a2b-source-install
  cancel-in-progress: false

jobs:
  governed-object-authority:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/increment-1a2b-object-lifecycle
          fetch-depth: 0
          persist-credentials: true

      - name: Install exact reviewed A2b source tree
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          test "$(find .github/a2b-clean-source -maxdepth 1 -type f -name 'part-*' | wc -l)" = 3
          cat .github/a2b-clean-source/part-* | base64 -d > /tmp/a2b-clean-source.tar.gz
          echo "01e0efd66a1b8816e3f48d0d8020c952ba85c0d11a376fa9d0eec4d8d007ec80  /tmp/a2b-clean-source.tar.gz" | sha256sum -c -
          if tar -tzf /tmp/a2b-clean-source.tar.gz | grep -E '(^/|(^|/)\.\.(/|$))'; then
            echo "unsafe archive path" >&2
            exit 1
          fi
          tar -xzf /tmp/a2b-clean-source.tar.gz -C .
          rm -rf .github/a2b-clean-source
          rm -rf .github/a2b-source-transfer
          rm -rf .github/a2b-apply
          rm -f .github/workflows/a2b-apply-corrective.yml
          rm -f .github/workflows/a2b-install-exact-source.yml
          git add -A
          git diff --cached --check
          test "$(git write-tree)" = "8600a71b096f50f052df35fbe64debf356a2c20d"
          test -f newsroom/authority/_object_system.py
          test -f newsroom/authority/_object_store.py
          test -f newsroom/authority/_object_cas.py
          test -f newsroom/tests/test_authority_a2b_fault_matrix.py
          test ! -e .github/a2b-clean-source
          test ! -e .github/a2b-source-transfer
          test ! -e .github/a2b-apply
          test ! -e .github/workflows/a2b-apply-corrective.yml
          test ! -e .github/workflows/a2b-install-exact-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(authority): implement governed object lifecycle"
          git push origin HEAD:agent/increment-1a2b-object-lifecycle

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Lockfile Check
        run: uv lock --check

      - name: Sync (Dev)
        run: uv sync --dev --locked

      - name: Focused A2b Tests
        id: focused
        continue-on-error: true
        run: |
          uv run python -m pytest -q \
            newsroom/tests/test_authority_a2b_*.py \
            --junitxml=a2b-results.xml

      - name: Upload A2b Test Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authority-a2b-test-evidence
          path: a2b-results.xml
          if-no-files-found: error

      - name: Enforce Focused Gate
        if: steps.focused.outcome != 'success'
        run: exit 1
