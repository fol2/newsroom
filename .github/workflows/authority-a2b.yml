name: Authority A2b

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  governed-object-authority:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/increment-1a2b-object-lifecycle
          fetch-depth: 0
          persist-credentials: true

      - name: Diagnose exact verified A2b source restore
        id: restore
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/a2b-restore.log) 2>&1
          if [[ ! -f .github/workflows/a2b-restore-history.yml ]]; then
            echo "restore_marker=absent"
            exit 0
          fi
          echo "restore_marker=present"
          source_commit=b806e62802a67ddedfbc58f4e1ee8ad4a53a2ff2
          git cat-file -e "$source_commit^{commit}"
          echo "source_commit=$source_commit"
          for part in 000 001 002; do
            path=".github/a2b-clean-source/part-$part"
            git show "$source_commit:$path" > "/tmp/part-$part"
            echo "part=$part bytes=$(wc -c < /tmp/part-$part) sha256=$(sha256sum /tmp/part-$part | awk '{print $1}')"
          done
          python - <<'PY'
          from pathlib import Path
          import base64

          standard = set(b'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=')
          urlsafe = set(b'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_=')
          pieces = []
          for part in ('000', '001', '002'):
              raw = Path(f'/tmp/part-{part}').read_bytes()
              compact = b''.join(raw.split())
              pieces.append(compact)
              standard_bad = [(index, byte) for index, byte in enumerate(compact) if byte not in standard]
              urlsafe_bad = [(index, byte) for index, byte in enumerate(compact) if byte not in urlsafe]
              print(f'part={part} compact_chars={len(compact)} mod4={len(compact) % 4}')
              print(f'part={part} standard_bad={standard_bad[:20]} count={len(standard_bad)}')
              print(f'part={part} urlsafe_bad={urlsafe_bad[:20]} count={len(urlsafe_bad)}')
              print(f'part={part} prefix={compact[:40]!r} suffix={compact[-40:]!r}')
          encoded = b''.join(pieces)
          print(f'combined_chars_before_padding={len(encoded)} mod4={len(encoded) % 4}')
          encoded += b'=' * (-len(encoded) % 4)
          print(f'combined_chars_after_padding={len(encoded)}')
          if all(byte in standard for byte in encoded):
              decoded = base64.b64decode(encoded, validate=True)
              print('decoder=standard')
          elif all(byte in urlsafe for byte in encoded):
              decoded = base64.b64decode(encoded, altchars=b'-_', validate=True)
              print('decoder=urlsafe')
          else:
              raise SystemExit('archive parts contain bytes outside standard and URL-safe base64 alphabets')
          Path('/tmp/a2b-source.tar.gz').write_bytes(decoded)
          PY
          actual_archive_sha="$(sha256sum /tmp/a2b-source.tar.gz | awk '{print $1}')"
          echo "archive_bytes=$(wc -c < /tmp/a2b-source.tar.gz)"
          echo "archive_sha256=$actual_archive_sha"
          test "$actual_archive_sha" = "01e0efd66a1b8816e3f48d0d8020c952ba85c0d11a376fa9d0eec4d8d007ec80"
          tar -tzf /tmp/a2b-source.tar.gz > /tmp/a2b-tar-list.txt
          echo "archive_entries=$(wc -l < /tmp/a2b-tar-list.txt)"
          if grep -E '(^/|(^|/)\.\.(/|$))' /tmp/a2b-tar-list.txt; then
            echo "unsafe_archive_path=true"
            exit 1
          fi
          tar -xzf /tmp/a2b-source.tar.gz -C .
          rm -rf .github/a2b-source .github/a2b-clean-source .github/a2b-apply .github/a2b-source-transfer
          rm -f .github/workflows/a2b-restore-history.yml
          rm -f .github/workflows/a2b-apply-corrective.yml .github/workflows/a2b-install-exact-source.yml
          git add -A
          git diff --cached --check
          actual_tree="$(git write-tree)"
          echo "actual_tree=$actual_tree"
          echo "expected_tree=8600a71b096f50f052df35fbe64debf356a2c20d"
          git status --short
          test "$actual_tree" = "8600a71b096f50f052df35fbe64debf356a2c20d"
          test -f newsroom/authority/_object_system.py
          test -f newsroom/authority/_object_store.py
          test -f newsroom/authority/_object_cas.py
          test -f newsroom/tests/test_authority_a2b_fault_matrix.py
          echo "restore_diagnostic=passed"

      - name: Upload restore diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a2b-restore-diagnostics
          path: |
            /tmp/a2b-restore.log
            /tmp/a2b-tar-list.txt
            /tmp/part-000
            /tmp/part-001
            /tmp/part-002
          if-no-files-found: warn

      - name: Enforce restore diagnostic
        if: steps.restore.outcome != 'success'
        run: exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Lockfile Check
        run: uv lock --check

      - name: Sync (Dev)
        run: uv sync --dev --locked

      - name: Focused A2b Tests
        id: focused
        continue-on-error: true
        run: |
          uv run python -m pytest -q \
            newsroom/tests/test_authority_a2b_*.py \
            --junitxml=a2b-results.xml

      - name: Upload A2b Test Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authority-a2b-test-evidence
          path: a2b-results.xml
          if-no-files-found: error

      - name: Enforce Focused Gate
        if: steps.focused.outcome != 'success'
        run: exit 1
