name: Authority A2b

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: a2b-source-install
  cancel-in-progress: false

jobs:
  governed-object-authority:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/increment-1a2b-object-lifecycle
          fetch-depth: 0
          persist-credentials: true

      - name: Install exact reviewed A2b source tree
        id: install
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          mkdir -p /tmp/a2b-install-diagnostics/clean-source
          cp .github/a2b-clean-source/part-* /tmp/a2b-install-diagnostics/clean-source/
          exec > >(tee -a /tmp/a2b-install-diagnostics/install.log) 2>&1
          set -euxo pipefail
          trap 'rc=$?; printf "exit_code=%s\n" "$rc" | tee /tmp/a2b-install-diagnostics/exit.txt; exit "$rc"' EXIT

          echo "stage=count-parts" | tee /tmp/a2b-install-diagnostics/stage.txt
          part_count="$(find .github/a2b-clean-source -maxdepth 1 -type f -name 'part-*' | wc -l)"
          echo "part_count=$part_count"
          test "$part_count" = 3

          echo "stage=reconstruct-archive" | tee /tmp/a2b-install-diagnostics/stage.txt
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          from pathlib import Path

          expected = "01e0efd66a1b8816e3f48d0d8020c952ba85c0d11a376fa9d0eec4d8d007ec80"
          paths = sorted(Path(".github/a2b-clean-source").glob("part-*"))
          if len(paths) != 3:
              raise SystemExit(f"expected 3 source parts, found {len(paths)}")

          alphabet = frozenset(b"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=")
          raw_parts = [path.read_bytes() for path in paths]
          filtered_parts: list[bytes] = []
          for path, raw in zip(paths, raw_parts, strict=True):
              filtered = bytes(byte for byte in raw if byte in alphabet)
              invalid = len(raw) - len(filtered)
              print(
                  f"part={path.name} raw_bytes={len(raw)} "
                  f"base64_bytes={len(filtered)} ignored_bytes={invalid} "
                  f"mod4={len(filtered) % 4}"
              )
              filtered_parts.append(filtered)

          def decode_padded(value: bytes) -> bytes:
              value += b"=" * ((-len(value)) % 4)
              return base64.b64decode(value, validate=False)

          attempts = {
              "concatenated": lambda: decode_padded(b"".join(filtered_parts)),
              "per-part": lambda: b"".join(
                  decode_padded(part) for part in filtered_parts
              ),
          }
          for name, attempt in attempts.items():
              try:
                  data = attempt()
              except Exception as exc:  # diagnostic only; exact SHA remains authority
                  print(f"strategy={name} error={type(exc).__name__}:{exc}")
                  continue
              digest = hashlib.sha256(data).hexdigest()
              print(f"strategy={name} bytes={len(data)} sha256={digest}")
              if digest == expected:
                  Path("/tmp/a2b-clean-source.tar.gz").write_bytes(data)
                  Path("/tmp/a2b-install-diagnostics/reconstruction.txt").write_text(
                      f"strategy={name}\nsha256={digest}\nbytes={len(data)}\n",
                      encoding="utf-8",
                  )
                  break
          else:
              raise SystemExit("no reconstruction strategy matched exact reviewed archive SHA")
          PY
          actual_archive_sha="$(sha256sum /tmp/a2b-clean-source.tar.gz | awk '{print $1}')"
          echo "actual_archive_sha=$actual_archive_sha" | tee /tmp/a2b-install-diagnostics/archive-sha.txt
          test "$actual_archive_sha" = "01e0efd66a1b8816e3f48d0d8020c952ba85c0d11a376fa9d0eec4d8d007ec80"

          echo "stage=validate-paths" | tee /tmp/a2b-install-diagnostics/stage.txt
          if tar -tzf /tmp/a2b-clean-source.tar.gz | grep -E '(^/|(^|/)\.\.(/|$))'; then
            echo "unsafe archive path" >&2
            exit 1
          fi

          echo "stage=extract" | tee /tmp/a2b-install-diagnostics/stage.txt
          tar -xzf /tmp/a2b-clean-source.tar.gz -C .
          rm -rf .github/a2b-clean-source
          rm -rf .github/a2b-source-transfer
          rm -rf .github/a2b-apply
          rm -f .github/workflows/a2b-apply-corrective.yml
          rm -f .github/workflows/a2b-install-exact-source.yml
          git add -A
          git diff --cached --check

          echo "stage=validate-tree" | tee /tmp/a2b-install-diagnostics/stage.txt
          actual_tree="$(git write-tree)"
          echo "actual_tree=$actual_tree" | tee /tmp/a2b-install-diagnostics/tree.txt
          test "$actual_tree" = "8600a71b096f50f052df35fbe64debf356a2c20d"
          test -f newsroom/authority/_object_system.py
          test -f newsroom/authority/_object_store.py
          test -f newsroom/authority/_object_cas.py
          test -f newsroom/tests/test_authority_a2b_fault_matrix.py
          test ! -e .github/a2b-clean-source
          test ! -e .github/a2b-source-transfer
          test ! -e .github/a2b-apply
          test ! -e .github/workflows/a2b-apply-corrective.yml
          test ! -e .github/workflows/a2b-install-exact-source.yml

          echo "stage=commit" | tee /tmp/a2b-install-diagnostics/stage.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(authority): implement governed object lifecycle"

          echo "stage=push" | tee /tmp/a2b-install-diagnostics/stage.txt
          git push origin HEAD:agent/increment-1a2b-object-lifecycle
          echo "stage=complete" | tee /tmp/a2b-install-diagnostics/stage.txt

      - name: Upload A2b install diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a2b-install-diagnostics
          path: /tmp/a2b-install-diagnostics
          if-no-files-found: warn

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Lockfile Check
        run: uv lock --check

      - name: Sync (Dev)
        run: uv sync --dev --locked

      - name: Focused A2b Tests
        id: focused
        continue-on-error: true
        run: |
          uv run python -m pytest -q \
            newsroom/tests/test_authority_a2b_*.py \
            --junitxml=a2b-results.xml

      - name: Upload A2b Test Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authority-a2b-test-evidence
          path: a2b-results.xml
          if-no-files-found: error

      - name: Enforce Focused Gate
        if: steps.focused.outcome != 'success'
        run: exit 1
