name: SDLC Phase 2B1c2b Runner Environment Fix

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b1c-final-decision

permissions:
  contents: write

concurrency:
  group: sdlc-phase2b1c2b-runner-env-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b1c-final-decision
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact runner-environment review fix
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/shadow_decision.py)" = bce6fed2c2ffc6070508a2de8880ed509e3167ba
          test "$(git hash-object newsroom/tests/test_sdlc_shadow_decision.py)" = ecf24818c2a42dce2435d70ab955fc4a89bc3e28
          test "$(git hash-object .sdlc/apply-shadow-decision-runner-env.py)" = e374404855042ccae128adc7de3830f2fa7112f3
          python .sdlc/apply-shadow-decision-runner-env.py
          grep -F 'receipt.consumer_runner_environment != context.runner_environment' scripts/sdlc/shadow_decision.py
          grep -F 'def test_consumer_runner_environment_must_match_decision_context(' newsroom/tests/test_sdlc_shadow_decision.py
          python -m py_compile scripts/sdlc/shadow_decision.py newsroom/tests/test_sdlc_shadow_decision.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify review correction
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_shadow_decision.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only review fix
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/sdlc-phase2b1c-runner-env-fix.yml .sdlc/apply-shadow-decision-runner-env.py
          git add scripts/sdlc/shadow_decision.py newsroom/tests/test_sdlc_shadow_decision.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): bind decision runner environment'
          git push origin HEAD:agent/sdlc-v2-phase2b1c-final-decision
