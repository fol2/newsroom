name: Install verified B1 contract checkpoint

on:
  push:
    branches:
      - agent/increment-1b1-graph-contracts
    paths:
      - .github/b1-checkpoint/**
      - .github/workflows/b1-install-checkpoint.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/b1-checkpoint/**
      - .github/workflows/b1-install-checkpoint.yml

permissions:
  contents: write

concurrency:
  group: b1-contract-checkpoint
  cancel-in-progress: false

jobs:
  install:
    if: >-
      github.event_name == 'push' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.head_ref == 'agent/increment-1b1-graph-contracts'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/increment-1b1-graph-contracts
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct and verify checkpoint
        id: install
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .github/b1-checkpoint ]]; then
            echo 'Checkpoint already installed.'
            echo 'installed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          root = Path('.github/b1-checkpoint')
          expected = [f'part-{index:02d}' for index in range(4)]
          actual = sorted(path.name for path in root.glob('part-*'))
          if actual != expected:
              raise SystemExit(f'part manifest mismatch: {actual!r}')
          encoded = ''.join(
              ''.join((root / name).read_text(encoding='ascii').split())
              for name in expected
          )
          if len(encoded) != 18460:
              raise SystemExit(f'encoded length mismatch: {len(encoded)}')
          archive = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(archive).hexdigest()
          expected_digest = 'dcd61fc3f46b3046c98cb3f166a970757de9586ea8562b097373ccef1409be5a'
          if digest != expected_digest:
              raise SystemExit(f'archive digest mismatch: {digest}')
          Path('/tmp/b1-contract-checkpoint.tar.xz').write_bytes(archive)
          PY
          xz -dc /tmp/b1-contract-checkpoint.tar.xz | tar -tf - > /tmp/b1-contract-checkpoint.list
          if grep -E '(^/|(^|/)\.\.(/|$))' /tmp/b1-contract-checkpoint.list; then
            echo 'unsafe archive path' >&2
            exit 1
          fi
          xz -dc /tmp/b1-contract-checkpoint.tar.xz | tar -xf - -C .
          rm -rf .github/b1-checkpoint
          git add -A
          git diff --cached --check

          # Workflow files are unchanged by the bot commit and excluded only
          # while verifying the exact reviewed source/config tree.
          git rm --cached --force .github/workflows/b1-export-checkout.yml
          git rm --cached --force .github/workflows/b1-install-checkpoint.yml
          actual_tree="$(git write-tree)"
          echo "actual_tree=$actual_tree"
          echo 'expected_tree=16ec1d1e2377568ba5c13d1b6a7692768137c7c1'
          test "$actual_tree" = '16ec1d1e2377568ba5c13d1b6a7692768137c7c1'
          git add .github/workflows/b1-export-checkout.yml .github/workflows/b1-install-checkpoint.yml
          echo 'installed=true' >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Lock and sync
        run: |
          uv lock --check
          uv sync --dev --locked

      - name: Focused contract tests
        run: uv run python -m pytest -q newsroom/tests/test_projection_b1_contracts.py

      - name: Commit and push checkpoint
        if: steps.install.outputs.installed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(projection): harden B1 contracts and migration'
          git push origin HEAD:agent/increment-1b1-graph-contracts
