name: SDLC Cache Telemetry Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-cache-telemetry

permissions:
  contents: write

concurrency:
  group: sdlc-cache-telemetry-publisher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-cache-telemetry
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact cache telemetry integration
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_lane.py)" = d1210536ee920fe6e82aae32524be19287aae801
          test "$(git hash-object scripts/sdlc/workflow_budget.py)" = f1b7114c9afa38a15c61ca0bed2a27ffd5053fcf
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_lane.py)" = 802b37d5c3bbc22e51545531fa7e7ca4fe8ac450
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_budget.py)" = bb7b917060618fca1cf7c34dd76d11137232a9b3
          test "$(git hash-object .sdlc/cache-telemetry-transform.py)" = 877e8ec09864c26ad36e392c661120662c976f4d
          python .sdlc/cache-telemetry-transform.py
          python -m py_compile \
            scripts/sdlc/workflow_lane.py \
            scripts/sdlc/workflow_budget.py \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_budget.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify exact cache telemetry
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_budget.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only cache telemetry
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/sdlc-cache-telemetry-publisher.yml \
            .sdlc/cache-telemetry-transform.py
          git add \
            scripts/sdlc/workflow_lane.py \
            scripts/sdlc/workflow_budget.py \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_budget.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(sdlc): record exact uv cache telemetry'
          git push origin HEAD:agent/sdlc-v2-phase2b-cache-telemetry
