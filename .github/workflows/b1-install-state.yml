name: Install verified B1 projection authority

on:
  push:
    branches:
      - agent/increment-1b1-graph-contracts
    paths:
      - .github/b1-state/**
      - .github/b1-fix/**
      - .github/workflows/b1-install-state.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/b1-state/**
      - .github/b1-fix/**
      - .github/workflows/b1-install-state.yml

permissions:
  contents: write

concurrency:
  group: b1-projection-authority-install
  cancel-in-progress: false

jobs:
  install-and-verify:
    if: >-
      github.event_name == 'push' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.head_ref == 'agent/increment-1b1-graph-contracts'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/increment-1b1-graph-contracts
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct, harden and stage exact B1 authority source
        id: install
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .github/b1-state ]]; then
            echo 'B1 authority source already installed.'
            echo 'installed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          def reconstruct(root_name: str, count: int, encoded_length: int, expected_digest: str, output: str) -> None:
              root = Path(root_name)
              expected = [f'part-{index:02d}' for index in range(count)]
              actual = sorted(path.name for path in root.glob('part-*'))
              if actual != expected:
                  raise SystemExit(f'{root_name} manifest mismatch: {actual!r}')
              encoded = ''.join(
                  ''.join((root / name).read_text(encoding='ascii').split())
                  for name in expected
              )
              if len(encoded) != encoded_length:
                  raise SystemExit(f'{root_name} encoded length mismatch: {len(encoded)}')
              data = base64.b64decode(encoded, validate=True)
              digest = hashlib.sha256(data).hexdigest()
              if digest != expected_digest:
                  raise SystemExit(f'{root_name} digest mismatch: {digest}')
              Path(output).write_bytes(data)
              print(f'{root_name}: parts={count} encoded_chars={len(encoded)} bytes={len(data)} sha256={digest}')

          reconstruct(
              '.github/b1-state',
              6,
              29752,
              '0c3450d33d11e88343b9b970e5707cfa71dafa061a005a7fa5568e2316b5c05c',
              '/tmp/b1-projection-authority.tar.xz',
          )
          reconstruct(
              '.github/b1-fix',
              5,
              13436,
              '204d5bd138ac9812c4c16996aed54af9e255a6cfb78e0387a5e17ab2a77bf659',
              '/tmp/b1-review-fixes.patch.xz',
          )
          PY
          xz -dc /tmp/b1-projection-authority.tar.xz | tar -tf - > /tmp/b1-projection-authority.list
          if grep -E '(^/|(^|/)\.\.(/|$))' /tmp/b1-projection-authority.list; then
            echo 'unsafe archive path' >&2
            exit 1
          fi
          xz -dc /tmp/b1-projection-authority.tar.xz | tar -xf - -C .
          xz -dc /tmp/b1-review-fixes.patch.xz > /tmp/b1-review-fixes.patch
          echo '1997db4ea834a0d4e207198015a181b8eeb673f939f0250deece782d27c8d677  /tmp/b1-review-fixes.patch' | sha256sum -c -
          git apply --check /tmp/b1-review-fixes.patch
          git apply /tmp/b1-review-fixes.patch
          rm -rf .github/b1-state .github/b1-fix
          git add -A
          git diff --cached --check
          git status --short

          # Temporary workflows are retained in this bot commit because the
          # workflow token cannot create/delete workflow files. Exclude them
          # only while verifying the exact reviewed source tree; the connected
          # GitHub app removes them after the source commit lands.
          git rm --cached --force .github/workflows/b1-export-checkout.yml
          git rm --cached --force .github/workflows/b1-install-checkpoint.yml
          git rm --cached --force .github/workflows/b1-install-state.yml
          actual_tree="$(git write-tree)"
          echo "actual_tree=$actual_tree"
          echo 'expected_tree=02293369b4d95c440ef5ae014179612f23ee932c'
          test "$actual_tree" = '02293369b4d95c440ef5ae014179612f23ee932c'
          git add .github/workflows/b1-export-checkout.yml \
                  .github/workflows/b1-install-checkpoint.yml \
                  .github/workflows/b1-install-state.yml

          test -f newsroom/authority/_projection_store.py
          test -f newsroom/authority/_projection_system.py
          test -f newsroom/authority/projection_system.py
          test -f newsroom/projection/system.py
          test -f newsroom/projection/traceability.py
          test -f newsroom/tests/test_projection_b1_authority.py
          test -f newsroom/tests/test_projection_b1_boundaries.py
          test -f newsroom/tests/test_projection_b1_migrations.py
          test ! -e .github/b1-state
          test ! -e .github/b1-fix
          echo 'installed=true' >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Lockfile and locked sync
        run: |
          uv lock --check
          uv sync --dev --locked

      - name: Compile
        run: uv run python -m compileall -q newsroom scripts

      - name: Focused authority and B1 tests
        run: |
          uv run python -m pytest -q \
            newsroom/tests/test_authority_*.py \
            newsroom/tests/test_projection_b1_*.py \
            --junitxml=/tmp/b1-focused.xml

      - name: Complete repository tests
        run: uv run python -m pytest -q

      - name: Clustering evaluation gate
        run: |
          uv run python scripts/eval_clustering_metrics.py \
            --dataset newsroom/evals/clustering_eval_dataset_v1.jsonl \
            --baseline newsroom/evals/clustering_eval_metrics_baseline_v1.json \
            --fail-on-regression

      - name: Commit and push reviewed source
        if: steps.install.outputs.installed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(projection): complete B1 projection authority'
          git push origin HEAD:agent/increment-1b1-graph-contracts
