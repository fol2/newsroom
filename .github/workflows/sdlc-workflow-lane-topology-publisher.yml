name: SDLC Workflow Lane Topology Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-shadow-workflow
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sdlc-workflow-lane-topology-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-shadow-workflow
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact topology correction
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_lane.py)" = 9e55340d3dc94c6a087a30893182e934a8442aba
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_lane.py)" = 3e354fcb508f8c9fb6e18307de1fe6bdb07f1c42
          test "$(git hash-object .sdlc/apply-workflow-lane-topology.py)" = 091b9d05efe656d1b8bf9bd4de2a884305b3e669
          python .sdlc/apply-workflow-lane-topology.py
          grep -F 'def _validate_test_topology(' scripts/sdlc/workflow_lane.py
          grep -F 'def test_route_test_topology_is_repository_owned(' newsroom/tests/test_sdlc_workflow_lane.py
          python -m py_compile scripts/sdlc/workflow_lane.py newsroom/tests/test_sdlc_workflow_lane.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify topology correction
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_workflow_lane.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only topology correction
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/sdlc-workflow-lane-topology-publisher.yml .sdlc/apply-workflow-lane-topology.py .sdlc/workflow-lane-topology.trigger
          git add scripts/sdlc/workflow_lane.py newsroom/tests/test_sdlc_workflow_lane.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): bind repository-owned lane test topology'
          git push origin HEAD:agent/sdlc-v2-phase2b-shadow-workflow
