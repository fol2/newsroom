name: Projection B1

on:
  push:
  pull_request:

jobs:
  projection-authority:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Lockfile check
        run: uv lock --check

      - name: Sync locked development environment
        run: uv sync --dev --locked

      - name: Focused B1 tests
        id: focused
        continue-on-error: true
        run: |
          uv run python -m pytest -q \
            newsroom/tests/test_projection_b1_*.py \
            --junitxml=projection-b1-results.xml

      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: projection-b1-test-evidence
          path: projection-b1-results.xml
          if-no-files-found: error

      - name: Enforce focused gate
        if: steps.focused.outcome != 'success'
        run: exit 1
