name: B3 Reconciliation Source Export

on:
  push:
    branches:
      - agent/increment-1b3-rebuild-promotion

permissions:
  contents: write

concurrency:
  group: b3-reconcile-source-export-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/increment-1b3-rebuild-promotion
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Publish exact source transport
        shell: bash
        run: |
          set -euo pipefail
          expected_head="$(git rev-parse HEAD)"
          test -z "$(git status --porcelain --untracked-files=all)"
          archive="${RUNNER_TEMP}/newsroom-source.tar.gz"
          git archive --format=tar.gz --output="${archive}" HEAD
          mkdir -p .sdlc
          base64 -w 76 "${archive}" > .sdlc/b3-reconcile-source.tar.gz.b64
          {
            printf 'head=%s\n' "${expected_head}"
            sha256sum "${archive}"
          } > .sdlc/b3-reconcile-source.sha256
          git add .sdlc/b3-reconcile-source.tar.gz.b64 .sdlc/b3-reconcile-source.sha256
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore(b3): stage exact reconciliation source transport'
          remote_head="$(git ls-remote origin refs/heads/agent/increment-1b3-rebuild-promotion | cut -f1)"
          test "${remote_head}" = "${expected_head}"
          git push --force-with-lease=refs/heads/agent/increment-1b3-rebuild-promotion:${expected_head} origin HEAD:agent/increment-1b3-rebuild-promotion
