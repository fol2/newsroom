name: SDLC Phase 2B1c1 Replay Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b1c-shadow-inputs
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sdlc-phase2b1c1-publisher-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b1c-shadow-inputs
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact review fixes
        run: |
          set -euo pipefail
          patch_sha=$(sha256sum .sdlc/replay-review-fixes.py | cut -d' ' -f1)
          source_blob=$(git hash-object scripts/sdlc/transport_replay.py)
          test_blob=$(git hash-object newsroom/tests/test_sdlc_transport_replay.py)
          printf 'patch_sha=%s\nsource_blob=%s\ntest_blob=%s\n' "$patch_sha" "$source_blob" "$test_blob"
          test "$patch_sha" = 8973b9b19527b811564282e03ba9a6c6ed6ed658821f1f7d97d6c6efd41d410e
          test "$source_blob" = adf3f22d48e5b33db36b2b3fea7aa5eef15dcf0e
          test "$test_blob" = 6df866ebca7778b8d673b5b137894c15a882c0f1
          python -m py_compile .sdlc/replay-review-fixes.py
          python .sdlc/replay-review-fixes.py
          source_sha=$(sha256sum scripts/sdlc/transport_replay.py | cut -d' ' -f1)
          test_sha=$(sha256sum newsroom/tests/test_sdlc_transport_replay.py | cut -d' ' -f1)
          printf 'source_sha=%s\ntest_sha=%s\n' "$source_sha" "$test_sha"
          test "$source_sha" = b45ebf0c2f204ffd9874f6200f7dcc3455aeb7f7ec48dd8ca7c028abeacc9d20
          test "$test_sha" = 41cdb0752aa51bf1f0e4dc695476a743d7e154983a5c04b5584ce0b18eecd531

      - name: Install exact uv and sync locked environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify replay boundary
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_transport_replay.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit and push source-only checkpoint
        run: |
          set -euo pipefail
          rm -f .sdlc/replay-review-fixes.py .sdlc/replay-review-fixes.trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/sdlc/transport_replay.py newsroom/tests/test_sdlc_transport_replay.py .sdlc/replay-review-fixes.py .sdlc/replay-review-fixes.trigger
          git commit -m 'fix(sdlc): harden transport replay semantics'
          git push origin HEAD:agent/sdlc-v2-phase2b1c-shadow-inputs
