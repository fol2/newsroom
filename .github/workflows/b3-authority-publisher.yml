name: B3 Authority Checkpoint Publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/increment-1b3-rebuild-promotion'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify and apply exact authority checkpoint
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          test "$(find .github/b3-authority-publish -maxdepth 1 -type f -name 'part-*' | wc -l | tr -d ' ')" = "15"
          cat > /tmp/b3-part-checksums.txt <<'EOF'
          e23f88d9d498d8162333fa4d807435d878baec9c200662d7d436c36a455a2876  .github/b3-authority-publish/part-00
          3a3e7521b8bd5c3a6ef0e99ed9d67d1cb67abf18a7c47194ff6aa5ccfdb90b26  .github/b3-authority-publish/part-01
          caa8d12fd5c767bef6c90d2efb1043ea963b8879a7738ae1d05ed0a0cc061d6d  .github/b3-authority-publish/part-02
          c9e5bbd65a219a9a0225aa20fd4f4bf664e840a876837325980f8f999e2661bf  .github/b3-authority-publish/part-03
          69b1a8471f3598d601c80b1e21152889fa95c3a00454819ae5b47d729c237355  .github/b3-authority-publish/part-04
          8d7984ae780e63589c0e2bf9c5932a56d56ad27b8b98e24282aad99f81053bd4  .github/b3-authority-publish/part-05
          74324607a788e647cacfc14cbf260e40ac9382846ea4d52921ab0f751d0f1a45  .github/b3-authority-publish/part-06
          0424c2e0d33e407337cec2c94efae7a040407b527d0c6d89a0ac9595d0760c6f  .github/b3-authority-publish/part-07
          026ba91dc12299f677dd920688076bb3b92526ea4ee98bae1e3614d277db521f  .github/b3-authority-publish/part-08
          603265471cf49647490909af108701c85b31c495cae6374c16ad5f919b770f4c  .github/b3-authority-publish/part-09
          533e8624f536d951da4c36c193a1ebc93364e6899ba76bf99852243fa36d8810  .github/b3-authority-publish/part-10
          3be02eeb96deea8ccdb0259bf69ca25a69a1ab54cfebc09b0ea32b18e167f097  .github/b3-authority-publish/part-11
          a5b42e1e664a116788f5f418632f63b68340c63c65f57f0d048142aed8b40c55  .github/b3-authority-publish/part-12
          b6dd009e7f56ad14a5a26c3e6b84d3ef15c4b0555003f1b2b2328ac12fca892b  .github/b3-authority-publish/part-13
          bac4699ef23861c83282e0a5622c1757b1b22c369fdb51adcf292504126c948c  .github/b3-authority-publish/part-14
          EOF
          sed -i 's/^          //' /tmp/b3-part-checksums.txt
          sha256sum --check --strict /tmp/b3-part-checksums.txt
          cat .github/b3-authority-publish/part-* > /tmp/b3-authority.patch.gz.b64
          echo "cac7c9795920629fec37b13d18943a33fd292ebc6ad6e87b597b11bb759c8345  /tmp/b3-authority.patch.gz.b64" | sha256sum --check --strict
          base64 --decode /tmp/b3-authority.patch.gz.b64 > /tmp/b3-authority.patch.gz
          echo "bec768609d609cb8d2f7ffeb1c0db5d2ea18649e70731f9d21b0510b5951cee9  /tmp/b3-authority.patch.gz" | sha256sum --check --strict
          gzip --test /tmp/b3-authority.patch.gz
          gzip --decompress --stdout /tmp/b3-authority.patch.gz > /tmp/b3-authority.patch
          echo "87908db4a519654d94ea817a9234b32651d4236e7991ae859f0ccad4f5d2d05b  /tmp/b3-authority.patch" | sha256sum --check --strict
          git apply --check --verbose /tmp/b3-authority.patch
          git apply /tmp/b3-authority.patch
          rm -rf .github/b3-authority-publish
          rm .github/workflows/b3-authority-publisher.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Qualify coherent authority checkpoint
        run: |
          uv lock --check
          uv sync --dev --locked
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_authority_*.py \
            newsroom/tests/test_projection_b1_*.py \
            newsroom/tests/test_projection_b2_*.py \
            newsroom/tests/test_projection_b3_*.py

      - name: Commit and push source-only authority checkpoint
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          ! git diff --cached --name-only | grep -E '(^|/)(b3-authority-publish|b3-authority-publisher)'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(projection): add authority generation promotion"
          git push origin HEAD:agent/increment-1b3-rebuild-promotion
