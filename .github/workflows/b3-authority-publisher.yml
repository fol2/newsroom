name: B3 Authority Checkpoint Publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/increment-1b3-rebuild-promotion'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify and apply exact authority checkpoint
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          base64 --decode .github/b3-authority.patch.gz.b64 > /tmp/b3-authority.patch.gz
          echo "166a3a77983fa2adf9f036e8d23f29ed6d6f9a05febd78b5eaf8466f3b56e410  /tmp/b3-authority.patch.gz" | sha256sum --check --strict
          gzip --decompress --stdout /tmp/b3-authority.patch.gz > /tmp/b3-authority.patch
          echo "87908db4a519654d94ea817a9234b32651d4236e7991ae859f0ccad4f5d2d05b  /tmp/b3-authority.patch" | sha256sum --check --strict
          git apply --check /tmp/b3-authority.patch
          git apply /tmp/b3-authority.patch
          rm .github/b3-authority.patch.gz.b64
          rm .github/workflows/b3-authority-publisher.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Qualify coherent authority checkpoint
        run: |
          uv lock --check
          uv sync --dev --locked
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_authority_*.py \
            newsroom/tests/test_projection_b1_*.py \
            newsroom/tests/test_projection_b2_*.py \
            newsroom/tests/test_projection_b3_*.py

      - name: Commit and push source-only authority checkpoint
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          ! git diff --cached --name-only | grep -E '(^|/)(b3-authority|b3-authority-publisher)'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(projection): add authority generation promotion"
          git push origin HEAD:agent/increment-1b3-rebuild-promotion
