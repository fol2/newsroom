name: B3 Authority Transport Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/increment-1b3-rebuild-promotion'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Capture deterministic transport diagnostics
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set +e
          exec > >(tee b3-authority-diagnostics.txt) 2>&1
          echo "expected_head=${EXPECTED_HEAD}"
          echo "actual_head=$(git rev-parse HEAD)"
          echo "head_tree=$(git rev-parse HEAD^{tree})"
          echo "main=$(git rev-parse origin/main)"
          echo "main_tree=$(git rev-parse origin/main^{tree})"
          echo "transport_bytes=$(wc -c < .github/b3-authority.patch.gz.b64 | tr -d ' ')"
          sha256sum .github/b3-authority.patch.gz.b64
          base64 --decode .github/b3-authority.patch.gz.b64 > /tmp/b3-authority.patch.gz
          echo "base64_status=$?"
          wc -c /tmp/b3-authority.patch.gz
          sha256sum /tmp/b3-authority.patch.gz
          gzip --test /tmp/b3-authority.patch.gz
          echo "gzip_test_status=$?"
          gzip --decompress --stdout /tmp/b3-authority.patch.gz > /tmp/b3-authority.patch
          echo "gzip_decode_status=$?"
          wc -c /tmp/b3-authority.patch
          sha256sum /tmp/b3-authority.patch
          git apply --check --verbose /tmp/b3-authority.patch
          echo "git_apply_check_status=$?"
          git status --short
          exit 0

      - name: Upload transport diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: b3-authority-diagnostics-${{ github.event.pull_request.head.sha }}
          path: b3-authority-diagnostics.txt
          if-no-files-found: error
          retention-days: 1
