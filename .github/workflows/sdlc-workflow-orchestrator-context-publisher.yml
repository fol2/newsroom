name: SDLC Workflow Orchestrator Context Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-evidence-workflow

permissions:
  contents: write

concurrency:
  group: sdlc-workflow-orchestrator-context-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-evidence-workflow
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact decision-context correction
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_orchestrator.py)" = 907a2836617d416b41e15a6810bd205141baceec
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_orchestrator.py)" = 265de15ab9d3d4f3f6adf97a4fe14eeee712b1ce
          test "$(git hash-object .sdlc/workflow-orchestrator-context-fix.py)" = ace0a41a14585d79d5e9a57897cb56b80e2ec7f0
          python .sdlc/workflow-orchestrator-context-fix.py
          python -m py_compile \
            scripts/sdlc/workflow_orchestrator.py \
            newsroom/tests/test_sdlc_workflow_orchestrator.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify decision-context correction
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_workflow_orchestrator.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only reviewed head
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/sdlc-workflow-orchestrator-context-publisher.yml \
            .sdlc/workflow-orchestrator-context-fix.py
          git add \
            scripts/sdlc/workflow_orchestrator.py \
            newsroom/tests/test_sdlc_workflow_orchestrator.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): bind final decision to parent context'
          git push origin HEAD:agent/sdlc-v2-phase2b-evidence-workflow
