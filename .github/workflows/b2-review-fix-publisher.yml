name: B2 Review Fix Publisher

on:
  push:
    branches:
      - agent/increment-1b2-neo4j-structural

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkpoint transport
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test "$(find .github/b2-checkpoint-v3 -maxdepth 1 -type f -name 'part-*' | wc -l | tr -d ' ')" = 1
          cat .github/b2-checkpoint-v3/part-* > /tmp/b2-review-fix.tar.gz.b64
          echo "7978e17cadb3077abb3c03a5bd96397688e1e7b5e7481cb129612b6ff6a57819  /tmp/b2-review-fix.tar.gz.b64" | sha256sum --check --strict
          base64 --decode /tmp/b2-review-fix.tar.gz.b64 > /tmp/b2-review-fix.tar.gz
          echo "4fb2027f9ea2b04d3487ad2e0d0be54f0b9b07fc0a510e9386a985d937f1ffa6  /tmp/b2-review-fix.tar.gz" | sha256sum --check --strict
          tar -tzf /tmp/b2-review-fix.tar.gz | LC_ALL=C sort > /tmp/b2-review-fix-files.txt
          cat > /tmp/b2-review-fix-expected.txt <<'EOF'
          newsroom/projection/neo4j/_adapter.py
          newsroom/projection/neo4j/models.py
          newsroom/tests/projection_b2_helpers.py
          newsroom/tests/test_projection_b2_adapter_unit.py
          newsroom/tests/test_projection_b2_contracts.py
          EOF
          sed -i 's/^          //' /tmp/b2-review-fix-expected.txt
          diff -u /tmp/b2-review-fix-expected.txt /tmp/b2-review-fix-files.txt

      - name: Materialize source-only review fixes
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/b2-review-fix.tar.gz -C .
          rm -rf .github/b2-checkpoint-v3
          rm -f .github/workflows/b2-review-fix-publisher.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Verify locked baseline
        run: |
          uv lock --check
          uv sync --dev --locked

      - name: Qualify reviewed checkpoint
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q \
            newsroom/tests/test_projection_b1_*.py \
            newsroom/tests/test_projection_b2_contracts.py \
            newsroom/tests/test_projection_b2_adapter_unit.py \
            newsroom/tests/test_projection_b2_authority.py

      - name: Commit and push source-only review fixes
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          ! git diff --cached --name-only | grep -E '(^|/)(b2-checkpoint-v3|b2-review-fix-publisher)'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(projection): harden Neo4j structural identities"
          git push origin HEAD:agent/increment-1b2-neo4j-structural
