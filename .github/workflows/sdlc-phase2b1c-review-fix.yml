name: SDLC Phase 2B1c2b Review Fix Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b1c-final-decision
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sdlc-phase2b1c2b-review-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b1c-final-decision
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact reviewed transformations
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/shadow_decision.py)" = c1f0defe68f700e1c9833b911e28933de045bb79
          test "$(git hash-object newsroom/tests/test_sdlc_shadow_decision.py)" = c7895806f7105a58f9ff178be9c6862f961ca049
          test "$(git hash-object .sdlc/apply-shadow-decision-review.py)" = cde8c2e5f48c867d75930f42a3b7949b7d4822d9
          python .sdlc/apply-shadow-decision-review.py
          python -m py_compile scripts/sdlc/shadow_decision.py newsroom/tests/test_sdlc_shadow_decision.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify review corrections
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_shadow_decision.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only review fixes
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/sdlc-phase2b1c-review-fix.yml .sdlc/apply-shadow-decision-review.py .sdlc/shadow-decision-review.part-* .sdlc/shadow-decision-review.trigger
          git add scripts/sdlc/shadow_decision.py newsroom/tests/test_sdlc_shadow_decision.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): harden shadow decision replay'
          git push origin HEAD:agent/sdlc-v2-phase2b1c-final-decision
