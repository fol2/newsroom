name: Increment 1C Checked Publisher

on:
  push:
    branches:
      - agent/increment-1c-integrated-foundation
    paths:
      - .sdlc/increment-1c-migration-wiring.patch
      - .github/workflows/increment-1c-publisher.yml

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.repository == 'fol2/newsroom'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact publication head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: true
          show-progress: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Set up exact uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: '0.8.0'
          enable-cache: true
          cache-dependency-glob: uv.lock
          github-token: ''

      - name: Apply, qualify and publish checked migration wiring
        shell: bash
        run: |
          set -euxo pipefail
          expected_head="${GITHUB_SHA}"
          test "$(git rev-parse HEAD)" = "${expected_head}"
          patch=.sdlc/increment-1c-migration-wiring.patch
          test "$(sha256sum "${patch}" | cut -d' ' -f1)" = \
            83201b86e71f6f4d14d01a7acc357945e01fb1019e263ab1de6d89fdb74eea78
          git apply --check --verbose "${patch}"
          git apply --verbose "${patch}"
          git rm "${patch}"
          git add \
            newsroom/authority/migrations.py \
            newsroom/tests/test_projection_b1_migrations.py
          expected_files="$(cat <<'EOF'
          .sdlc/increment-1c-migration-wiring.patch
          newsroom/authority/migrations.py
          newsroom/tests/test_projection_b1_migrations.py
          EOF
          )"
          actual_files="$(git diff --cached --name-only | sort)"
          test "${actual_files}" = "${expected_files}"
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(integrated): wire candidate authority schema'

          uv lock --check
          uv sync --dev --locked
          uv run --no-sync python -m compileall -q newsroom scripts
          uv run --no-sync python -m pytest -q \
            newsroom/tests/test_projection_b1_migrations.py \
            newsroom/tests/test_integrated_c1_contracts.py
          uv run --no-sync python -m pytest -q newsroom/tests
          uv run --no-sync python scripts/eval_clustering_metrics.py \
            --dataset newsroom/evals/clustering_eval_dataset_v1.jsonl \
            --baseline newsroom/evals/clustering_eval_metrics_baseline_v1.json \
            --fail-on-regression
          git diff --check "${expected_head}" HEAD
          test -z "$(git status --porcelain --untracked-files=all)"

          remote_head="$(git ls-remote origin refs/heads/agent/increment-1c-integrated-foundation | cut -f1)"
          test "${remote_head}" = "${expected_head}"
          git push \
            --force-with-lease=refs/heads/agent/increment-1c-integrated-foundation:${expected_head} \
            origin HEAD:agent/increment-1c-integrated-foundation
          echo "PUBLISHED_HEAD=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"

      - name: Publish temporary source locator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 82 --repo "${GITHUB_REPOSITORY}" --body \
            "Temporary 1C publisher completed: run \`${GITHUB_RUN_ID}\`, source head \`${PUBLISHED_HEAD}\`, parent \`${GITHUB_SHA}\`. Publisher workflow removal is pending."
