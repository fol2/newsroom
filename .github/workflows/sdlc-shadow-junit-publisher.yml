name: SDLC Shadow JUnit Path Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-evidence-workflow-release

permissions:
  contents: write

concurrency:
  group: sdlc-shadow-junit-path-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/sdlc-v2-phase2b-evidence-workflow-release
          fetch-depth: 0
          show-progress: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Apply artifact-relative JUnit correction
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_lane.py)" = 057f30aa4d6ec0bc0f8aa6283eff55c0262cea02
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_lane.py)" = 5b4c55a616b62ff0facc03e83243d469fa82e377
          test "$(git hash-object .sdlc/fix-shadow-junit-path.py)" = 1bc5bf9d78dfb8d1f92ec98b0792cc84d596fe69
          python .sdlc/fix-shadow-junit-path.py
          python -m py_compile \
            scripts/sdlc/workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_lane.py

      - name: Sync locked environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify artifact-relative JUnit correction
        shell: bash
        run: |
          set -euo pipefail
          if ! {
            uv run --no-sync python -m compileall -q newsroom scripts &&
            uv run --no-sync python -m pytest -q \
              newsroom/tests/test_sdlc_workflow_lane.py \
              newsroom/tests/test_sdlc_artifact_receipt.py \
              newsroom/tests/test_sdlc_shadow_lane.py \
              newsroom/tests/test_sdlc_evidence_workflow.py &&
            uv run --no-sync python -m pytest -q newsroom/tests/test_sdlc_*.py &&
            git diff --check
          } > .sdlc/junit-path-diagnostic.txt 2>&1; then
            sed -n '1,240p' .sdlc/junit-path-diagnostic.txt
            git add .sdlc/junit-path-diagnostic.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'chore(sdlc): record JUnit path diagnostic'
            git push origin HEAD:agent/sdlc-v2-phase2b-evidence-workflow-release
            exit 1
          fi
          rm -f .sdlc/junit-path-diagnostic.txt

      - name: Commit source-only correction
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/sdlc-shadow-junit-publisher.yml \
            .sdlc/fix-shadow-junit-path.py
          git add \
            scripts/sdlc/workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_lane.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): bind JUnit reports to artifact namespace'
          git push origin HEAD:agent/sdlc-v2-phase2b-evidence-workflow-release
