name: Install verified A2b source

on:
  push:
    branches:
      - agent/increment-1a2b-final
    paths:
      - .github/a2b-upload/**
      - .github/workflows/a2b-install-final.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/a2b-upload/**
      - .github/workflows/a2b-install-final.yml

permissions:
  contents: write

concurrency:
  group: a2b-final-install
  cancel-in-progress: false

jobs:
  install-and-verify:
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.head_ref == 'agent/increment-1a2b-final'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: agent/increment-1a2b-final
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct and stage exact source
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          root = Path('.github/a2b-upload')
          expected = [f'part-{index:02d}' for index in range(3)]
          expected += [
              f'part-{index:02d}-{sub:02d}'
              for index in range(3, 23)
              for sub in range(3)
          ]
          expected += ['part-23-00', 'part-23-01']
          actual = sorted(path.name for path in root.glob('part-*'))
          if actual != expected:
              raise SystemExit(f'part manifest mismatch: {actual!r}')

          encoded = ''.join(
              ''.join((root / name).read_text(encoding='ascii').split())
              for name in expected
          )
          if len(encoded) != 70300:
              raise SystemExit(f'encoded length mismatch: {len(encoded)}')
          archive = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(archive).hexdigest()
          expected_digest = 'e09bf1dadd22e8fb7b9c832113944c20cfdb317be737bfa6219de85b471b75fc'
          if digest != expected_digest:
              raise SystemExit(f'archive digest mismatch: {digest}')
          Path('/tmp/a2b-final-source.tar.xz').write_bytes(archive)
          print(f'parts={len(expected)} encoded_chars={len(encoded)} archive_bytes={len(archive)} sha256={digest}')
          PY
          xz -dc /tmp/a2b-final-source.tar.xz | tar -tf - > /tmp/a2b-final-source.list
          if grep -E '(^/|(^|/)\.\.(/|$))' /tmp/a2b-final-source.list; then
            echo 'unsafe archive path' >&2
            exit 1
          fi
          xz -dc /tmp/a2b-final-source.tar.xz | tar -xf - -C .
          rm -rf .github/a2b-upload
          rm -f .github/workflows/a2b-install-final.yml
          git add -A
          git diff --cached --check
          actual_tree="$(git write-tree)"
          echo "actual_tree=$actual_tree"
          echo 'expected_tree=2cadaef351ac4631ceee4c0aab894ba762cacf34'
          test "$actual_tree" = '2cadaef351ac4631ceee4c0aab894ba762cacf34'
          test -f newsroom/authority/_object_system.py
          test -f newsroom/authority/_object_store.py
          test -f newsroom/authority/_object_cas.py
          test -f newsroom/tests/test_authority_a2b_fault_matrix.py
          test ! -e .github/a2b-upload
          test ! -e .github/workflows/a2b-install-final.yml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Lockfile check
        run: uv lock --check

      - name: Sync locked development environment
        run: uv sync --dev --locked

      - name: Focused A2b tests
        run: |
          uv run python -m pytest -q \
            newsroom/tests/test_authority_a2b_*.py \
            --junitxml=/tmp/a2b-focused.xml

      - name: A1 and A2a regression tests
        shell: bash
        run: |
          mapfile -t files < <(
            find newsroom/tests -maxdepth 1 -name 'test_authority_*.py' \
              ! -name 'test_authority_a2b_*' | sort
          )
          uv run python -m pytest -q "${files[@]}" \
            --junitxml=/tmp/a2b-regression.xml

      - name: Independent A2b fault matrix
        run: |
          uv run python -m pytest -q \
            newsroom/tests/test_authority_a2b_integrity_faults.py \
            newsroom/tests/test_authority_a2b_fault_matrix.py \
            --junitxml=/tmp/a2b-faults.xml

      - name: Complete repository tests
        run: uv run python -m pytest -q

      - name: Clustering evaluation gate
        run: |
          uv run python scripts/eval_clustering_metrics.py \
            --dataset newsroom/evals/clustering_eval_dataset_v1.jsonl \
            --baseline newsroom/evals/clustering_eval_metrics_baseline_v1.json \
            --fail-on-regression

      - name: Commit and push source-only implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(authority): implement governed object lifecycle'
          git push origin HEAD:agent/increment-1a2b-final
