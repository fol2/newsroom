name: B3 SDLC Service Topology Publisher

on:
  push:
    branches:
      - agent/increment-1b3-rebuild-promotion

permissions:
  contents: write

concurrency:
  group: b3-sdlc-service-topology-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/increment-1b3-rebuild-promotion
          fetch-depth: 0
          show-progress: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Apply exact SDLC service topology
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object .sdlc/fix-b3-sdlc-service-topology.py)" = 52b35b10a581600a6be49c57fad091947b07ed34
          test "$(git hash-object scripts/sdlc/workflow_lane.py)" = 37705be7b29a7bc347aad974a282269318a59a16
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_lane.py)" = ac2e93c7cf46df5e3cd74fce6311ddc7798e7b48
          test "$(git hash-object newsroom/tests/test_sdlc_classifier.py)" = 16b71fcdf76509632e6c22d96b8b99c56fd1c771
          python .sdlc/fix-b3-sdlc-service-topology.py
          python -m py_compile \
            scripts/sdlc/workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_classifier.py

      - name: Sync locked environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify topology and regression
        shell: bash
        run: |
          set -euo pipefail
          uv run --no-sync python -m compileall -q newsroom scripts
          uv run --no-sync python -m pytest -q \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_classifier.py \
            newsroom/tests/test_projection_b3_*.py
          uv run --no-sync python -m pytest -q newsroom/tests
          uv run --no-sync python scripts/eval_clustering_metrics.py \
            --dataset newsroom/evals/clustering_eval_dataset_v1.jsonl \
            --baseline newsroom/evals/clustering_eval_metrics_baseline_v1.json \
            --fail-on-regression
          git diff --check

      - name: Commit source-only correction
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .sdlc/fix-b3-sdlc-service-topology.py
          git add \
            scripts/sdlc/workflow_lane.py \
            newsroom/tests/test_sdlc_workflow_lane.py \
            newsroom/tests/test_sdlc_classifier.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): include B3 actual-service topology'
          git push origin HEAD:agent/increment-1b3-rebuild-promotion
