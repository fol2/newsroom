name: SDLC Phase 2B Diagnostics

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-shadow-decision

permissions:
  contents: write

concurrency:
  group: sdlc-phase2b-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-shadow-decision
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.8.0
      - name: Sync locked environment
        run: uv sync --dev --locked
      - name: Capture full pytest output
        id: pytest
        shell: bash
        run: |
          set +e
          uv run python -m pytest -q > full-pytest.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: sdlc-phase2b-diagnostics-${{ github.sha }}
          path: full-pytest.log
          if-no-files-found: error
          retention-days: 1
      - name: Publish bounded diagnostic tail
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .sdlc
          {
            printf 'pytest_status=%s\n' '${{ steps.pytest.outputs.status }}'
            tail -n 160 full-pytest.log
          } > .sdlc/phase2b-diagnostic-tail.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .sdlc/phase2b-diagnostic-tail.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore(sdlc): publish bounded Phase 2B diagnostic tail'
          git push origin HEAD:agent/sdlc-v2-phase2b-shadow-decision
      - name: Preserve result
        run: exit "${{ steps.pytest.outputs.status }}"
