name: SDLC Workflow Budget Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-budget-wrappers

permissions:
  contents: write

concurrency:
  group: sdlc-workflow-budget-publisher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b-budget-wrappers
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Apply exact environment-profile correction
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/sdlc/workflow_budget.py)" = fd080669d74f28a8ef10a4e68ac2f1299d03e8b5
          test "$(git hash-object newsroom/tests/test_sdlc_workflow_budget.py)" = c3f4675c0d16a984654ca539fa81d13bb22975c9
          test "$(git hash-object .sdlc/workflow-budget-environment-fix.py)" = 46f4bfab13a2e02f78c9d8e3b5e893c6f904068d
          python .sdlc/workflow-budget-environment-fix.py
          python -m py_compile \
            scripts/sdlc/workflow_budget.py \
            newsroom/tests/test_sdlc_workflow_budget.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify budget wrappers
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_workflow_budget.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only reviewed head
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/sdlc-workflow-budget-publisher.yml \
            .sdlc/workflow-budget-environment-fix.py
          git add \
            scripts/sdlc/workflow_budget.py \
            newsroom/tests/test_sdlc_workflow_budget.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(sdlc): separate route and lane environments'
          git push origin HEAD:agent/sdlc-v2-phase2b-budget-wrappers
