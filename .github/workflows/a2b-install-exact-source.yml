name: Install exact A2b source

on:
  push:
    branches:
      - agent/increment-1a2b-object-lifecycle
    paths:
      - .github/a2b-source-transfer/**
      - .github/workflows/a2b-install-exact-source.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/a2b-source-transfer/**
      - .github/workflows/a2b-install-exact-source.yml

permissions:
  contents: write

jobs:
  install:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/increment-1a2b-object-lifecycle
          fetch-depth: 0

      - name: Recover missing transfer chunks from Git history
        id: recover
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'
          : > /tmp/a2b-transfer-history.txt
          for path in \
            .github/a2b-source-transfer/part-006-03-00 \
            .github/a2b-source-transfer/part-007-02-01
          do
            echo "path=$path" >> /tmp/a2b-transfer-history.txt
            if [[ ! -f "$path" ]]; then
              commit="$(git log --all --format='%H' -- "$path" | head -n 1 || true)"
              echo "historical_commit=$commit" >> /tmp/a2b-transfer-history.txt
              if [[ -n "$commit" ]]; then
                mkdir -p "$(dirname "$path")"
                git show "$commit:$path" > "$path"
                echo "recovered_sha256=$(sha256sum "$path" | awk '{print $1}')" >> /tmp/a2b-transfer-history.txt
              fi
            else
              echo "already_present_sha256=$(sha256sum "$path" | awk '{print $1}')" >> /tmp/a2b-transfer-history.txt
            fi
          done
          echo "transfer_files=$(find .github/a2b-source-transfer -maxdepth 1 -type f | wc -l)" >> /tmp/a2b-transfer-history.txt
          find .github/a2b-source-transfer -maxdepth 1 -type f -printf '%f %s\n' | sort >> /tmp/a2b-transfer-history.txt
          git archive --format=tar.gz --output=/tmp/a2b-donor-branch.tar.gz origin/agent/increment-1a2b-governed-object-lifecycle
          echo "donor_sha256=$(sha256sum /tmp/a2b-donor-branch.tar.gz | awk '{print $1}')" >> /tmp/a2b-transfer-history.txt
          cat /tmp/a2b-transfer-history.txt

      - name: Upload transfer, history diagnostics and donor branch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a2b-reconstruction-inputs
          path: |
            .github/a2b-source-transfer
            /tmp/a2b-transfer-history.txt
            /tmp/a2b-donor-branch.tar.gz
          if-no-files-found: error

      - name: Reconstruct and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/a2b-source-transfer/part-006-03-00
          test -f .github/a2b-source-transfer/part-007-02-01
          cat .github/a2b-source-transfer/part-* | base64 -d > /tmp/a2b-source.tar.gz
          echo "84239738f8713ac39391e162cdea8b3c84683a05431560266778de5c8c222948  /tmp/a2b-source.tar.gz" | sha256sum -c -
          if tar -tzf /tmp/a2b-source.tar.gz | grep -E '(^/|(^|/)\.\.(/|$))'; then
            echo "unsafe archive path" >&2
            exit 1
          fi
          tar -xzf /tmp/a2b-source.tar.gz -C .
          rm -rf .github/a2b-source-transfer .github/a2b-apply
          rm -f .github/workflows/a2b-apply-corrective.yml
          rm -f .github/workflows/a2b-install-exact-source.yml
          git add -A
          test "$(git write-tree)" = "0b4eaf973d861c38a1f0b6d7c998c190fc2509f5"
          git diff --cached --check
          test -f newsroom/authority/_object_system.py
          test -f newsroom/authority/_object_store.py
          test -f newsroom/authority/_object_cas.py
          test -f newsroom/tests/test_authority_a2b_fault_matrix.py
          test ! -e .github/a2b-apply
          test ! -e .github/a2b-source-transfer
          test ! -e .github/workflows/a2b-apply-corrective.yml

      - name: Commit and push exact source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(authority): implement governed object lifecycle"
          git push origin HEAD:agent/increment-1a2b-object-lifecycle
