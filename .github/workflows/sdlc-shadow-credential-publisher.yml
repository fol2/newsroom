name: SDLC Shadow Credential Scope Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b-evidence-workflow-release
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sdlc-shadow-credential-scope-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/sdlc-v2-phase2b-evidence-workflow-release
          fetch-depth: 0
          show-progress: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Apply exact credential-scope hardening
        shell: bash
        run: |
          set -euo pipefail
          if ! {
            test "$(git hash-object .github/workflows/evidence.yml)" = 39bbd53005d0820aba68da5f6e5fc2e78cff55da &&
            test "$(git hash-object newsroom/tests/test_sdlc_evidence_workflow.py)" = 878055ed9c68bc9798280a15cca233c112243b81 &&
            test "$(git hash-object .sdlc/harden-shadow-credential-scope.py)" = 18a020c56fb439394b73ac1fe06258278a22f849 &&
            test "$(git hash-object .sdlc/harden-shadow-admin-file.py)" = 0eb893717f216abd970530705538a5d970bc067d &&
            python .sdlc/harden-shadow-credential-scope.py &&
            python .sdlc/harden-shadow-admin-file.py &&
            python -m py_compile newsroom/tests/test_sdlc_evidence_workflow.py
          } > .sdlc/credential-transform-diagnostic.txt 2>&1; then
            sed -n '1,240p' .sdlc/credential-transform-diagnostic.txt
            git add .sdlc/credential-transform-diagnostic.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'chore(sdlc): record credential-transform diagnostic'
            git push origin HEAD:agent/sdlc-v2-phase2b-evidence-workflow-release
            exit 1
          fi
          rm -f .sdlc/credential-transform-diagnostic.txt

      - name: Sync locked environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify exact credential-scope hardening
        shell: bash
        run: |
          set -euo pipefail
          if ! {
            uv run --no-sync python -m compileall -q newsroom scripts &&
            uv run --no-sync python -m pytest -q \
              newsroom/tests/test_sdlc_evidence_workflow.py \
              newsroom/tests/test_sdlc_workflow_lane.py \
              newsroom/tests/test_sdlc_workflow_budget.py &&
            uv run --no-sync python -m pytest -q newsroom/tests/test_sdlc_*.py &&
            git diff --check
          } > .sdlc/credential-scope-diagnostic.txt 2>&1; then
            sed -n '1,240p' .sdlc/credential-scope-diagnostic.txt
            git add .sdlc/credential-scope-diagnostic.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'chore(sdlc): record credential-scope diagnostic'
            git push origin HEAD:agent/sdlc-v2-phase2b-evidence-workflow-release
            exit 1
          fi
          rm -f .sdlc/credential-scope-diagnostic.txt

      - name: Commit source-only hardening
        shell: bash
        run: |
          set -euo pipefail
          expected_head="$(git rev-parse HEAD)"
          rm -f \
            .github/workflows/sdlc-shadow-credential-publisher.yml \
            .sdlc/harden-shadow-credential-scope.py \
            .sdlc/harden-shadow-admin-file.py \
            .sdlc/harden-shadow-credential-scope.trigger \
            .sdlc/credential-transform-diagnostic.txt \
            .sdlc/credential-scope-diagnostic.txt
          git add -A
          git status --short
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          remote_head="$(git ls-remote origin refs/heads/agent/sdlc-v2-phase2b-evidence-workflow-release | cut -f1)"
          test "${remote_head}" = "${expected_head}"
          git commit -m 'fix(sdlc): minimize shadow workflow credentials'
          git push origin HEAD:agent/sdlc-v2-phase2b-evidence-workflow-release
