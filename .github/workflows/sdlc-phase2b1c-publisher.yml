name: SDLC Phase 2B1c2b Source Publisher

on:
  push:
    branches:
      - agent/sdlc-v2-phase2b1c-final-decision

permissions:
  contents: write

concurrency:
  group: sdlc-phase2b1c2b-publisher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: agent/sdlc-v2-phase2b1c-final-decision
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Reconstruct exact decision source
        shell: bash
        run: |
          set -euo pipefail
          test ! -e scripts/sdlc/shadow_decision.py
          test ! -e newsroom/tests/test_sdlc_shadow_decision.py
          test "$(sha256sum .sdlc/shadow-decision.payload.part-00 | cut -d' ' -f1)" = 0c90e3bc811740659110c93c32b668969a7a7054981f1df096e47dd348ec6e58
          test "$(sha256sum .sdlc/shadow-decision.payload.part-01 | cut -d' ' -f1)" = 1f156c1dec2461ca75d771096af8320b3ec337bfbc6e86a032f9df51548284f6
          test "$(sha256sum .sdlc/shadow-decision.payload.part-02 | cut -d' ' -f1)" = 4c7222a2c7b7c83e391390c891fafce4f6499589d2a435f14db6759885f16d9d
          test "$(sha256sum .sdlc/shadow-decision.payload.part-03 | cut -d' ' -f1)" = dc6141fb473b36205a4773d8addd81341e5325453cf9f578c9271bc9111977a4
          test "$(sha256sum .sdlc/shadow-decision.payload.part-04 | cut -d' ' -f1)" = ecdb97506361a9fec89cbdb7c5ec18efb9c729f69f6b25efcc54464b336b542d
          test "$(sha256sum .sdlc/shadow-decision.payload.part-05 | cut -d' ' -f1)" = e0207b0460ce429ae0c780d8246beaf5728f3122ae081fb6fc66a0a7629bde78
          test "$(sha256sum .sdlc/shadow-decision.payload.part-06 | cut -d' ' -f1)" = f0f5c3fa3848acdb1f54a6a1c454e868840021ba47af28fa3b2eb89004794fd4
          test "$(sha256sum .sdlc/shadow-decision.payload.part-07 | cut -d' ' -f1)" = 78ecdee30b4141772744f6972b7fa4a8d2161d27595c623e2f4591e308d1ee68
          test "$(sha256sum .sdlc/shadow-decision.payload.part-08 | cut -d' ' -f1)" = 7d8f92524e548975c399cc390373ec885dfc8888b8b1bc3918b799218ca277a7
          test "$(sha256sum .sdlc/shadow-decision.payload.part-09 | cut -d' ' -f1)" = 6d769ff392b2a48da0262240f21801c1b363f363c060924c16b78be9561a0047
          cat .sdlc/shadow-decision.payload.part-* > phase2b1c.tar.gz.b64
          test "$(sha256sum phase2b1c.tar.gz.b64 | cut -d' ' -f1)" = d2643ebe32da5ff39bb65d80223924587f6d7270ec9da35eaa5f30add5546a31
          base64 --decode phase2b1c.tar.gz.b64 > phase2b1c.tar.gz
          test "$(sha256sum phase2b1c.tar.gz | cut -d' ' -f1)" = 932f6003264c8e34482a4a0a919270b460ceb111961cebb208d42880c7be931b
          tar --extract --gzip --file phase2b1c.tar.gz
          test "$(sha256sum scripts/sdlc/shadow_decision.py | cut -d' ' -f1)" = 60487f484913a6ccd1d64bdc3fd963b80a7fccdc54a288a10b9b73dc37197d22
          test "$(sha256sum newsroom/tests/test_sdlc_shadow_decision.py | cut -d' ' -f1)" = c3b86a91b68c406fc4eb13c03c9328dbdbb72630168b8d4c07edbfdb9955e178
          python -m py_compile scripts/sdlc/shadow_decision.py newsroom/tests/test_sdlc_shadow_decision.py
          git add -N scripts/sdlc/shadow_decision.py newsroom/tests/test_sdlc_shadow_decision.py

      - name: Sync locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.0
          uv lock --check
          uv sync --dev --locked

      - name: Verify decision boundary
        run: |
          uv run python -m compileall -q newsroom scripts
          uv run python -m pytest -q newsroom/tests/test_sdlc_shadow_decision.py
          uv run python -m pytest -q newsroom/tests/test_sdlc_*.py
          git diff --check

      - name: Commit source-only checkpoint
        shell: bash
        run: |
          set -euo pipefail
          rm -f phase2b1c.tar.gz phase2b1c.tar.gz.b64
          git rm -f .github/workflows/sdlc-phase2b1c-publisher.yml .sdlc/shadow-decision.payload.part-* .sdlc/shadow-decision.trigger
          git add scripts/sdlc/shadow_decision.py newsroom/tests/test_sdlc_shadow_decision.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(sdlc): aggregate exact shadow decision'
          git push origin HEAD:agent/sdlc-v2-phase2b1c-final-decision
